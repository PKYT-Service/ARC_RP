<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Howard Armory - Accès Refusé</title>
    <style>
        :root {
            --tactical-black: #1a1a1a;
            --paper-cream: #f2f0e9;
            --alert-red: #d63031; /* Rouge alerte pour l'erreur */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--paper-cream);
            color: var(--tactical-black);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ZONE SUPÉRIEURE --- */
        .tactical-header {
            background-color: var(--tactical-black);
            height: 50%;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Animation Sécurité (Anneaux tournants) */
        .security-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .security-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: spin-right 15s linear infinite;
        }

        .security-ring-inner {
            position: absolute;
            width: 75%;
            height: 75%;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--alert-red);
            border-radius: 50%;
            animation: spin-left 3s linear infinite;
        }

        @keyframes spin-right {
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-left {
            100% { transform: rotate(-360deg); }
        }

        /* Icône centrale (Cadenas) */
        .main-icon {
            color: var(--paper-cream);
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* Badge d'erreur */
        .status-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background-color: var(--paper-cream);
            color: var(--alert-red);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.2rem;
            border: 4px solid var(--tactical-black);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 3;
        }

        /* --- ZONE INFÉRIEURE --- */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            color: var(--alert-red);
        }

        .sub-text {
            font-size: 1rem;
            color: #444;
            max-width: 320px;
            margin-bottom: 40px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* Bouton d'action */
        .action-btn {
            background-color: var(--tactical-black);
            color: var(--paper-cream);
            text-decoration: none;
            display: inline-block;
            border: none;
            padding: 18px 40px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background-color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .action-btn:active {
            transform: translateY(1px);
        }

        /* Footer spécifique */
        .brand-footer {
            margin-top: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .brand-name {
            font-weight: 900;
            letter-spacing: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .brand-context {
            font-size: 0.7rem;
            opacity: 0.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="tactical-header">
        <div class="security-container">
            <div class="security-ring"></div>
            <div class="security-ring-inner"></div>
            
            <svg class="main-icon" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>

            <div class="status-badge">✖</div>
        </div>
    </div>

    <div class="content-area">
        <h1>Accès Refusé</h1>
        <p class="sub-text">
            Erreur d'authentification.<br>Vos habilitations tactiques sont invalides ou la session a expiré.
        </p>

        <button class="action-btn" onclick="window.location.href='https://howardarmory-ee.vercel.app/HA-EE#in'"> NOUVELLE TENTATIVE
        </button>

        <div class="brand-footer">
            <span class="brand-name">Howard Armory</span>
            <span class="brand-context">Dark RP Garry's mod sur GTA City RP</span>
        </div>
    </div>

</body>
</html>
