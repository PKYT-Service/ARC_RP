<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>A.R.C. Systems - Accréditations.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        arc: { 
                            dark: '#1A140E', 
                            gold: '#AA823C', 
                            champagne: '#D4AF37', 
                            light: '#FAF8F5' 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FAF8F5; 
            /* Fond décoratif style grille réseau */
            background-image: radial-gradient(#AA823C 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-attachment: fixed;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 130, 60, 0.15);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .glass-card:hover { 
            border-color: rgba(170, 130, 60, 0.5); 
            box-shadow: 0 10px 30px rgba(170, 130, 60, 0.08); 
            transform: translateY(-2px);
        }
        
        .light-scrollbar::-webkit-scrollbar { width: 6px; }
        .light-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .light-scrollbar::-webkit-scrollbar-thumb { background: rgba(170, 130, 60, 0.3); border-radius: 4px; }
    </style>
</head>

<body class="text-arc-dark selection:bg-arc-gold/30 overflow-y-auto light-scrollbar min-h-screen relative">
    <div class="fixed inset-0 bg-[#FAF8F5]/90 pointer-events-none -z-10"></div>

    <script src="/HA-EE/src/javascript/menu.js"></script>
    <div id="menu"></div>

    <main class="max-w-6xl mx-auto p-4 lg:p-8 space-y-12 mt-4 pb-24 relative z-10">

        <div class="border-b border-black/10 pb-6 text-center">
            <h1 class="text-3xl md:text-5xl font-display font-black uppercase tracking-tight">
                Effectifs de <span class="bg-gradient-to-r from-[#D4AF37] to-[#AA823C] bg-clip-text text-transparent">l'entreprise</span>
            </h1>
            <p class="text-xs font-mono text-gray-500 mt-3 tracking-widest uppercase flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-arc-gold rotate-45 inline-block"></span>
               <span id="company-name">...</span>— A.R.C. Systems
            </p>
        </div>

        <div id="organigramme-container" class="space-y-16">
            <div class="text-center text-gray-500 font-mono py-10">
                <i class="fas fa-circle-notch fa-spin text-2xl mb-4 block text-arc-gold"></i>
                Synchronisation des terminaux...
            </div>
        </div>

    </main>

    <script type="module" src="/HA-EE/src/javascript/footer.js"></script>
    <div id="footer"></div>

    <script type="module">
        import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

        async function loadView() {
            const container = document.getElementById('organigramme-container');
            
            // 1. Récupérer les catégories triées par la nouvelle colonne 'ordre'
            const { data: categories } = await fromAgence('employe_categories').select('*').order('ordre', { ascending: true });
            
            // 2. Récupérer UNIQUEMENT les employés visibles
            const { data: employes } = await fromAgence('employes').select('*').eq('visible', true).order('nom');

            container.innerHTML = '';

            if (!employes || employes.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 font-mono py-10">AUCUNE DONNÉE MATRICE DISPONIBLE</p>';
                return;
            }

            // 3. Affichage par catégorie
            categories.forEach(cat => {
                const catEmployees = employes.filter(e => e.categorie_id === cat.id);
                
                // On n'affiche la catégorie que s'il y a des employés visibles dedans
                if (catEmployees.length > 0) {
                    const section = document.createElement('div');
                    section.className = 'space-y-6';
                    
                    section.innerHTML = `
                        <div class="flex items-center gap-4">
                            <h3 class="text-arc-gold font-mono text-sm uppercase tracking-[0.4em] font-bold shrink-0">${cat.nom}</h3>
                            <div class="h-px flex-1 bg-gradient-to-r from-arc-gold/30 to-transparent"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="view-list-${cat.id}"></div>
                    `;
                    container.appendChild(section);

                    const list = document.getElementById(`view-list-${cat.id}`);

                    catEmployees.forEach(emp => {
                        const card = document.createElement('div');
                        card.className = "glass-card rounded-2xl relative overflow-hidden flex flex-col sm:flex-row";
                        card.innerHTML = `
                            <div class="w-full sm:w-1/3 bg-black/[0.02] p-6 flex flex-col items-center justify-center border-b sm:border-b-0 sm:border-r border-black/5 relative overflow-hidden">
                                <div class="w-16 h-16 rounded-xl bg-white border border-arc-gold/30 shadow-sm flex items-center justify-center text-arc-gold mb-3">
                                    <i class="fas fa-user-tie text-2xl"></i>
                                </div>
                                <div class="text-center z-10">
                                    <p class="text-[9px] font-mono tracking-widest uppercase text-gray-400 mb-1">ID: #${emp.id_compte}</p>
                                    <p class="text-[10px] font-mono text-emerald-600 bg-emerald-500/10 border border-emerald-500/20 px-2 py-1 rounded inline-block uppercase font-bold">VÉRIFIÉ</p>
                                </div>
                            </div>
                            <div class="w-full sm:w-2/3 p-6 flex flex-col justify-center bg-white/40">
                                <h2 class="text-xl font-display font-bold uppercase tracking-tight mb-1 text-arc-dark">${emp.prenom} <span class="text-arc-gold">${emp.nom}</span></h2>
                                <p class="text-[10px] text-gray-500 uppercase font-mono tracking-widest mb-4 border-b border-black/5 pb-2">${emp.poste || 'NON ASSIGNÉ'}</p>
                                
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <p class="text-[8px] text-gray-400 uppercase font-mono tracking-widest">échelon</p>
                                        <p class="font-mono text-xs text-gray-700 font-semibold">${emp.echelon || '?'}</p>
                                    </div>
                                    <div>
                                        <p class="text-[8px] text-gray-400 uppercase font-mono tracking-widest">Statut Réseau</p>
                                        <p class="font-bold text-xs ${emp.presence ? 'text-emerald-600' : 'text-gray-400'}">
                                            ${emp.presence ? 'embauché' : 'Essaie'}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadView);

    

async function initHeader() {
    const el = document.getElementById('company-name');
    if (!el) return;

    // 1. Récupération du token pour savoir qui est là
    const token = sessionStorage.getItem('session_token');
    
    // 2. Hash rapide pour identifier l'email sans passer par Auth
    async function getHash(string) {
        const utf8 = new TextEncoder().encode(string.toLowerCase().trim());
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    try {
        // 3. On récupère TOUT le monde pour trouver l'employé (comme dans ton init système)
        const { data: employes, error: errEmp } = await supabase.from('employes').select('email, id_agence');
        if (errEmp) throw errEmp;

        let monEmploye = null;
        for (const emp of employes) {
            if (await getHash(emp.email) === token) {
                monEmploye = emp;
                break;
            }
        }

        if (!monEmploye || !monEmploye.id_agence) throw new Error("Employé inconnu");

        // 4. On récupère le nom de l'entreprise
        const { data: agence, error: errAgence } = await supabase
            .from('agence_liste')
            .select('nom_entreprise')
            .eq('id_agence', monEmploye.id_agence)
            .single();

        if (errAgence) throw errAgence;

        // 5. Affichage
        el.textContent = agence.nom_entreprise;

    } catch (err) {
        console.error("Header Error:", err);
        el.textContent = "Erreur, veuillez contacer l'assistance"; // Nom par défaut
    }
}

document.addEventListener('DOMContentLoaded', initHeader);
    </script>
</body>
</html>
