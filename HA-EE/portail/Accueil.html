    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        ha: {
                            gold: '#c5a059',
                            darkgold: '#8c6f3c',
                            glow: 'rgba(197, 160, 89, 0.08)',
                        },
                        ui: {
                            900: '#050505',
                            800: '#080808',
                            700: '#121212',
                            border: 'rgba(255, 255, 255, 0.05)'
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'blob': 'blob 10s infinite alternate',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '100%': { transform: 'translate(20px, -30px) scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; }
        
        .glass-panel {
            background: rgba(8, 8, 8, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid theme('colors.ui.border');
        }

        .menu-item {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .menu-item:hover {
            background: rgba(197, 160, 89, 0.03);
            transform: translateX(4px);
            border-left-color: theme('colors.ha.gold');
        }

        .sub-btn {
            transition: all 0.2s ease;
            position: relative;
        }
        
        .sub-btn::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 2px;
            height: 0%;
            background-color: theme('colors.ha.gold');
            transition: all 0.2s ease;
            border-radius: 4px;
        }
        
        .sub-btn:hover::before { height: 60%; transform: translateY(-50%) scaleY(1); }
        .sub-btn:hover { color: #fff; padding-left: 1.5rem; background: rgba(255, 255, 255, 0.01); }

        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(197, 160, 89, 0.4); }

        iframe { transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        iframe.loaded { opacity: 1; }

        .loader-ring {
            width: 48px; height: 48px;
            border: 2px solid rgba(197, 160, 89, 0.1);
            border-left-color: theme('colors.ha.gold');
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .ambient-glow {
            position: fixed; width: 40vw; height: 40vw;
            background: radial-gradient(circle, theme('colors.ha.glow') 0%, transparent 60%);
            border-radius: 50%; z-index: 0; filter: blur(80px); opacity: 0.5; pointer-events: none;
        }
    </style>
</head>

                    </div>
                </div>

                <iframe id="main-frame" src="about:blank" class="w-full h-full border-none bg-transparent" title="Contenu principal" onload="hideLoader()"></iframe>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <script>
        function loadPage(url, title = "Navigation") {
            const frame = document.getElementById('main-frame');
            const loader = document.getElementById('loader');
            
            frame.classList.remove('loaded');
            loader.style.opacity = '1';
            loader.style.visibility = 'visible';

            const moduleName = url.split('/').pop().replace('.html', '').replace(/[@%-_]/g, ' ').toUpperCase() || 'SYS';
            document.getElementById('loader-module-name').innerText = moduleName;

            setTimeout(() => {
                frame.src = url;
                document.getElementById('page-title').innerText = title;
                document.getElementById('current-section').innerText = moduleName;
            }, 50);

            if (window.innerWidth < 1024) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('-translate-x-full')) toggleSidebar();
            }
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            const frame = document.getElementById('main-frame');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                    frame.classList.add('loaded');
                }, 500);
            }, 300);
        }

        function toggleDropdown(id) {
            const menu = document.getElementById(id);
            const arrow = document.getElementById('arrow-' + id);
            menu.classList.toggle('hidden');
            arrow.classList.toggle('rotate-180');
            arrow.classList.toggle('text-ha-gold');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            sidebar.classList.toggle('-translate-x-full');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            } else {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        window.onload = () => loadPage('/HA-EE/portail/dashboard.html', 'Dashboard Standby');
    </script>

    <!-- Supabase Auth Logic -->
    <script type="module">
        import { supabase, setAgenceSession, hashEmail } from '/HA-EE/src/javascript/sp.js';

        async function getHash(text) {
            return hashEmail(text);
        }

        async function updateIdentityBlock() {
            const nameEl = document.getElementById('user_full_name');
            const gradeEl = document.getElementById('user_grade_display');
            const avatarEl = document.getElementById('user_avatar');
            const token = sessionStorage.getItem('session_token');
            const isAuth = sessionStorage.getItem('isAuth');

            if (!token || !isAuth) { nameEl.textContent = "Non identifié"; return; }

            try {
                const { data: employes, error: empError } = await supabase.from('employes').select('email, nom, prenom, poste, echelon, id_agence');
                if (empError || !employes) throw empError;

                let userData = null;
                for (const emp of employes) {
                    if (await getHash(emp.email) === token) { userData = emp; break; }
                }

                if (!userData) { nameEl.textContent = "Empreinte inconnue"; return; }

                if (userData.id_agence) setAgenceSession(userData.id_agence, userData.email);

                nameEl.textContent = `${userData.nom.toUpperCase()} ${userData.prenom.charAt(0).toUpperCase() + userData.prenom.slice(1).toLowerCase()}`;
                gradeEl.innerHTML = `<span class="text-ha-gold font-bold tracking-wide">${userData.poste || "S.Staff"}</span> <span class="bg-white/5 border border-white/5 px-1 rounded-sm ml-1 text-[8px] text-neutral-400">E.${userData.echelon || "0"}</span>`;
                avatarEl.innerHTML = (userData.nom.charAt(0) + userData.prenom.charAt(0)).toUpperCase();
            } catch (err) {
                console.error("🚨 Erreur synchronisation :", err);
                nameEl.textContent = "Erreur Flux";
            }
        }
        document.addEventListener('DOMContentLoaded', updateIdentityBlock);

        document.addEventListener("DOMContentLoaded", () => {
    const iframe = document.getElementById("main-frame");

    if (iframe) {
        iframe.addEventListener("load", () => {
            try {
                // 1. On récupère l'URL interne de l'iframe
                const currentIframeUrl = iframe.contentWindow.location.href;

                // 2. Si l'utilisateur est déco et tombe sur la page d'erreur OAuth
                if (currentIframeUrl.includes("/HA-EE/src/err/oauth")) {
                    
                    // 3. Boum ! Redirection de l'onglet principal complet
                    window.location.href = "/HA-EE";
                }
            } catch (error) {
                // Sécurité CORS : Si l'iframe navigue temporairement sur un autre domaine 
                // (ex: l'écran de login brut de Supabase/Google), le navigateur bloque la lecture.
                // On attrape l'erreur ici pour éviter que le reste du site ne plante.
            }
        });
    }
});
    </script>
