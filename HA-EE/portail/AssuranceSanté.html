<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- E-CDE Account & Security Soft -->
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>Howard Armory - Assurance Santé</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        neutral: { 850: '#1a1a1a', 900: '#111111', 950: '#070707' },
                        ha: { red: '#E63946', gold: '#D4AF37' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070707; }
        
        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover { border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .dark-scrollbar::-webkit-scrollbar { width: 6px; }
        .dark-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    </style>
</head>

<body class="text-white selection:bg-ha-gold/30 h-screen overflow-y-auto dark-scrollbar relative">
    <!-- Background Texture -->
    <div class="fixed inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 pointer-events-none z-0"></div>
    <div class="fixed top-0 left-0 w-full h-full bg-gradient-to-br from-ha-gold/5 via-transparent to-transparent pointer-events-none z-0"></div>

    <div id="session/howard"></div>
    <div class="relative z-10 w-full">
        <script src="/HA-EE/src/javascript/menu.js"></script>
        <div id="menu"></div>
    </div>

    <main id="content" class="w-full max-w-4xl mx-auto p-4 lg:p-8 space-y-8 mt-4 relative z-10 pb-24">

        <div class="border-b border-ha-gold/30 pb-4 mb-4">
            <h1 class="text-3xl lg:text-4xl font-display font-black uppercase tracking-tighter text-ha-gold flex items-center gap-4">
                <i class="fas fa-hand-holding-medical"></i> Protocole AS
            </h1>
            <p class="text-xs text-neutral-500 font-mono mt-1 tracking-widest uppercase">Howard Armory - Internal Payroll System V4</p>
        </div>

        <div class="glass-card rounded-2xl p-6 lg:p-8 shadow-2xl relative overflow-hidden">
            <i class="fas fa-file-invoice-dollar absolute -right-10 -bottom-10 text-9xl text-white/5 rotate-12"></i>

            <form id="as-form" class="space-y-6 relative z-10">

                <!-- DATE -->
                <div class="bg-black/50 p-4 rounded-xl border border-white/5 hover:border-white/10 transition-colors">
                    <label class="block text-[10px] font-mono tracking-widest uppercase text-neutral-500 mb-3"><i class="fas fa-calendar-day text-ha-gold mr-2"></i>Date d'opération</label>
                    <input type="date" id="date_service" required
                        class="w-full bg-black/50 border border-neutral-700/50 rounded-lg p-3 text-neutral-300 font-mono text-sm focus:ring-1 focus:ring-ha-gold focus:border-ha-gold outline-none transition-all">
                </div>

                <!-- HORAIRES -->
                <div class="bg-black/50 p-4 rounded-xl border border-white/5 hover:border-white/10 transition-colors">
                    <label class="block text-[10px] font-mono tracking-widest uppercase text-neutral-500 mb-3"><i class="fas fa-clock text-ha-gold mr-2"></i>Plages horaires (Vacations)</label>
                    <div id="horaires-list" class="space-y-3">
                        <div class="flex gap-3 items-center horaire-row bg-neutral-900/50 p-2 rounded-lg border border-white/5">
                            <input type="time" class="time-de bg-black/50 border border-neutral-800 rounded-md p-2 flex-1 text-sm font-mono focus:border-ha-gold outline-none" required>
                            <span class="text-neutral-600 font-mono lowercase tracking-wider text-xs">à</span>
                            <input type="time" class="time-a bg-black/50 border border-neutral-800 rounded-md p-2 flex-1 text-sm font-mono focus:border-ha-gold outline-none" required>
                            <button type="button" onclick="removeRow(this)" class="text-neutral-600 hover:text-ha-red w-8 h-8 flex items-center justify-center rounded transition-colors bg-neutral-900/50">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    <button type="button" onclick="addRow()"
                        class="mt-4 text-[10px] font-bold font-mono text-ha-gold hover:text-white uppercase tracking-[0.2em] px-3 py-2 border border-ha-gold/30 rounded inline-flex items-center gap-2 hover:bg-ha-gold/10 transition-all">
                        <i class="fas fa-plus"></i> Ajouter une vacation
                    </button>
                </div>

                <!-- NOTE -->
                <div class="bg-black/50 p-4 rounded-xl border border-white/5 hover:border-white/10 transition-colors">
                    <label class="block text-[10px] font-mono tracking-widest uppercase text-neutral-500 mb-3"><i class="fas fa-pen-clip text-ha-gold mr-2"></i>Note de service (Optionnel)</label>
                    <textarea id="commentaire" placeholder="Ex: Patrouille Zone Nord / Convoi Armes..."
                        class="w-full bg-black/50 border border-neutral-700/50 rounded-lg p-3 text-neutral-300 font-mono text-sm h-24 focus:ring-1 focus:ring-ha-gold focus:border-ha-gold outline-none resize-none transition-all"></textarea>
                </div>

                <!-- PREVIEW -->
                <div class="bg-ha-gold/5 border border-ha-gold/20 rounded-xl p-6 shadow-inner relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-ha-gold/5 to-transparent pointer-events-none"></div>
                    <div class="flex flex-col md:flex-row justify-between items-center text-sm relative z-10 gap-2">
                        <span class="text-neutral-400 font-mono tracking-widest text-[10px] uppercase flex items-center gap-2"><i class="fas fa-stopwatch text-ha-gold"></i> Temps Tolal Estimé</span>
                        <span id="total-preview" class="text-ha-gold font-display font-black text-3xl md:text-4xl tracking-tighter drop-shadow-md">00h 00m</span>
                    </div>
                    <p class="text-[9px] text-neutral-600 mt-2 italic text-center md:text-right font-mono uppercase tracking-widest">Calcul basé sur des tranches de 15 minutes.</p>
                </div>

                <button type="submit"
                    class="w-full bg-ha-gold/10 border border-ha-gold/50 text-ha-gold hover:bg-ha-gold hover:text-black font-display font-bold py-4 rounded-xl text-lg uppercase tracking-widest transition-all shadow-[0_0_20px_rgba(212,175,55,0.1)] hover:shadow-[0_0_30px_rgba(212,175,55,0.4)] flex justify-center items-center gap-3">
                    <i class="fas fa-paper-plane"></i> Déclarer le service
                </button>
            </form>
        </div>
    </main>

    <div class="relative z-10">
        <script src="/HA-EE/src/javascript/footer.js"></script>
        <div id="footer"></div>
    </div>

    <!-- JS -->
    <script type="module">
        import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

        // Initialisation Date du jour
        document.getElementById('date_service').valueAsDate = new Date();

        // Ajouter une ligne horaire
        window.addRow = function () {
            const container = document.getElementById('horaires-list');
            const newRow = document.createElement('div');
            newRow.className = "flex gap-3 items-center horaire-row bg-neutral-900/50 p-2 rounded-lg border border-white/5 opacity-0 translate-y-2 transition-all duration-300";
            newRow.innerHTML = `
                <input type="time" class="time-de bg-black/50 border border-neutral-800 rounded-md p-2 flex-1 text-sm font-mono focus:border-ha-gold outline-none" required>
                <span class="text-neutral-600 font-mono lowercase tracking-wider text-xs">à</span>
                <input type="time" class="time-a bg-black/50 border border-neutral-800 rounded-md p-2 flex-1 text-sm font-mono focus:border-ha-gold outline-none" required>
                <button type="button" onclick="removeRow(this)" class="text-neutral-600 hover:text-ha-red w-8 h-8 flex items-center justify-center rounded transition-colors bg-neutral-900/50">
                    <i class="fas fa-times"></i>
                </button>
            `;
            container.appendChild(newRow);
            setTimeout(() => { newRow.classList.remove('opacity-0', 'translate-y-2'); }, 10);
            attachListeners();
        }

        // Supprimer une ligne
        window.removeRow = function (btn) {
            const rows = document.querySelectorAll('.horaire-row');
            if (rows.length > 1) {
                btn.closest('.horaire-row').remove();
                calculateTotal();
            }
        }

        // Calculer le temps total en temps réel
        function calculateTotal() {
            let totalMin = 0;
            document.querySelectorAll('.horaire-row').forEach(row => {
                const de = row.querySelector('.time-de').value;
                const a = row.querySelector('.time-a').value;

                if (de && a) {
                    const [hD, mD] = de.split(':').map(Number);
                    let [hA, mA] = a.split(':').map(Number);

                    let start = hD * 60 + mD;
                    let end = hA * 60 + mA;
                    if (end < start) end += 1440; // Passage de minuit

                    totalMin += (end - start);
                }
            });

            const hours = Math.floor(totalMin / 60);
            const mins = totalMin % 60;
            document.getElementById('total-preview').innerText = `${hours.toString().padStart(2, '0')}h ${mins.toString().padStart(2, '0')}m`;
            return totalMin;
        }

        function attachListeners() {
            document.querySelectorAll('input[type="time"]').forEach(input => {
                input.onchange = calculateTotal;
            });
        }
        attachListeners();

        // Envoi Supabase
        document.getElementById('as-form').onsubmit = async (e) => {
            e.preventDefault();

            const token = sessionStorage.getItem('session_token');
            const { data: employees } = await fromAgence('employes').select('email');

            async function getHash(s) {
                const u = new TextEncoder().encode(s.toLowerCase().trim());
                const b = await crypto.subtle.digest('SHA-256', u);
                return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('');
            }

            let userEmail = "";
            for (const emp of employees) {
                if (await getHash(emp.email) === token) { userEmail = emp.email; break; }
            }

            if (!userEmail) {
                alert("Erreur: Impossible de vérifier l'identité.");
                return;
            }

            const vacations = [];
            document.querySelectorAll('.horaire-row').forEach(row => {
                vacations.push({
                    de: row.querySelector('.time-de').value,
                    a: row.querySelector('.time-a').value
                });
            });

            const { error } = await insertAgence('assurance_sante', [{
                email: userEmail,
                date_service: document.getElementById('date_service').value,
                horaires: vacations,
                commentaire: document.getElementById('commentaire').value,
                statut: 'en_attente'
            }]);

            if (error) {
                alert("Erreur de transmission : " + error.message);
            } else {
                alert("✅ Déclaration envoyée. En attente de validation par un superviseur.");
                window.location.reload();
            }
        };
    </script>
</body>
</html>
