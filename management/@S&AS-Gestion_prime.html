<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- E-CDE Account & Security Soft - LOCAL REDIRECT -->
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>S&AS - Gestionnaire Primes</title>

    <link rel="shortcut icon" href="https://howardarmory.vercel.app/data/img/favicon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        neutral: { 850: '#1a1a1a', 900: '#111111', 950: '#070707' },
                        ha: { red: '#e11d48', darkred: '#9f1239' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: transparent; }
        
        .glass-card {
            background: rgba(17, 17, 17, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.2s;
        }
        .input-glass:focus {
            border-color: #3b82f6; /* Blue focus for Prime standalone */
            outline: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .dark-scrollbar::-webkit-scrollbar { width: 6px; }
        .dark-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>

<body class="text-white selection:bg-blue-500 selection:text-white h-screen overflow-y-auto dark-scrollbar">
    <div id="session/howard"></div>
    <script src="/HA-EE/src/javascript/menu.js"></script>
    <div id="menu" class="hidden"></div>

    <main id="content" class="w-full h-full p-4 lg:p-8">
        <div perms.pages="2;rh" class="max-w-4xl mx-auto space-y-8 pb-20">

            <header class="flex flex-col md:flex-row justify-between items-end pb-6 border-b border-white/10 gap-4 mb-4">
                <div>
                    <h1 class="text-4xl md:text-5xl font-display font-black uppercase tracking-tight text-white drop-shadow-lg">
                        Howard <span class="text-blue-500">Primes</span>
                    </h1>
                    <p class="text-[10px] font-mono text-neutral-400 uppercase tracking-widest mt-2">
                        <i class="fa-solid fa-coins mr-2"></i>Gestionnaire des Variations Salariales
                    </p>
                    
                    <div class="flex gap-2 mt-6 relative z-10 glass-card p-2 rounded-xl inline-flex shadow-[0_0_15px_rgba(0,0,0,0.5)]">
                        <select id="sel-month" class="input-glass rounded-lg p-2 text-xs font-bold outline-none uppercase font-display cursor-pointer">
                            <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option> 
                            <option value="3">Avril</option><option value="4">Mai</option><option value="5">Juin</option>
                            <option value="6">Juillet</option><option value="7">Août</option><option value="8">Septembre</option>
                            <option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
                        </select>
                        <input type="number" id="sel-year" value="2026" class="input-glass rounded-lg p-2 w-20 text-xs text-center font-mono font-bold outline-none">
                        <button onclick="updateDateContext()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-black uppercase hover:bg-blue-500 transition transform active:scale-95 shadow-lg">
                            <i class="fas fa-sync"></i>
                        </button>
                    </div>
                </div>
                
                <div class="text-right">
                    <div id="status-grille" class="text-[9px] font-mono bg-black/60 px-4 py-2 rounded-lg border border-white/5 text-neutral-400 flex items-center shadow-inner mb-2 inline-flex">
                        <i class="fas fa-spinner fa-spin mr-2 text-blue-500"></i> Initialisation...
                    </div>
                </div>
            </header>

            <div class="glass-card p-6 md:p-8 rounded-3xl relative overflow-hidden shadow-2xl">
                <div class="absolute left-0 top-0 w-64 h-64 bg-blue-500/5 rounded-full blur-3xl -translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>

                <div class="flex justify-between items-center mb-6 relative z-10">
                    <label class="block text-xs font-display font-black uppercase tracking-widest text-neutral-400"><i class="fas fa-users-cog mr-2"></i>Agents Concernés (Multi-Sélection)</label>
                    <button id="btn-batch-all" class="text-[9px] bg-blue-500/10 hover:bg-blue-500 text-blue-500 hover:text-white px-4 py-2 rounded-lg border border-blue-500/30 uppercase transition-colors font-bold tracking-widest shadow-inner relative z-20">
                        <i class="fas fa-layer-group mr-2"></i> Tout le personnel
                    </button>
                </div>

                <div id="selected-employees-tags" class="flex flex-wrap gap-2 mb-4 relative z-10 min-h-[30px]"></div>

                <div class="relative z-10">
                    <input type="text" id="Headline" list="HeadlineList" placeholder="RECHERCHER ET CIBLER UN MEMBRE..." 
                           class="w-full p-5 bg-black/60 text-white font-display font-bold border border-white/10 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all uppercase text-sm placeholder:text-neutral-600 shadow-inner">
                    <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-neutral-500"></i>
                </div>
                <datalist id="HeadlineList"></datalist>
            </div>

            <div id="primes-interface" class="hidden glass-card p-6 md:p-8 rounded-3xl border-l-2 border-blue-500 shadow-2xl relative">
                <h3 class="text-xs font-display font-black uppercase tracking-widest text-blue-400 mb-6 flex justify-between items-center">
                    <span><i class="fas fa-file-invoice-dollar mr-2"></i>Détail de l'opération (Prime/Sanction)</span>
                    <span id="edit-mode-indicator" class="hidden text-ha-red animate-pulse bg-ha-red/10 px-3 py-1 rounded bg-black/50 border border-ha-red/30"><i class="fas fa-edit mr-2"></i>MODE ÉDITION</span>
                </h3>
                
                <input type="hidden" id="edit-prime-id" value="">

                <div class="flex flex-col md:flex-row gap-4 items-end bg-black/40 p-5 rounded-2xl border border-white/5">
                    <div class="w-full md:w-1/4">
                        <label class="text-[9px] font-mono font-bold uppercase tracking-widest text-neutral-500 mb-2 block">Jour d'imputation</label>
                        <select id="prime-day-select" class="w-full input-glass p-3 rounded-lg font-mono text-xs cursor-pointer"></select>
                    </div>
                    <div class="w-full md:w-1/2">
                        <label class="text-[9px] font-mono font-bold uppercase tracking-widest text-neutral-500 mb-2 block">Note (Motif)</label>
                        <input type="text" id="prime-reason" placeholder="Ex: Risque majeur OU Retard de pointeuse..." class="w-full input-glass p-3 rounded-lg font-sans text-xs">
                    </div>
                    <div class="w-full md:w-1/4">
                        <label class="text-[9px] font-mono font-bold uppercase tracking-widest text-neutral-500 mb-2 block">Montant ($)</label>
                        <input type="number" id="prime-amount" step="any" placeholder="-100 ou 100" class="w-full input-glass p-3 rounded-lg font-mono font-black text-right text-xs">
                    </div>
                    
                    <div class="flex gap-2">
                        <button id="btn-save-prime" class="bg-blue-600 hover:bg-blue-500 text-white font-display font-black py-3 px-6 rounded-lg uppercase tracking-wider text-xs border border-blue-700 transition-all shadow-lg whitespace-nowrap outline-none">
                            <i class="fas fa-save mr-2"></i><span id="btn-save-text">Valider</span>
                        </button>
                        <button id="btn-cancel-edit" class="hidden bg-neutral-800 hover:bg-neutral-700 text-white font-bold py-3 px-4 rounded-lg border border-white/10 transition-all">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <div id="active-primes-list" class="mt-6 flex flex-wrap gap-3"></div>
            </div>

        </div>
    </main>

    <script type="module">
        // LOCAL REDIRECT
        import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

        let employeeList = [];
        let selectedEmps = [];
        let currentEmp = null;
        let loadedPrimes = [];
        let selectedMonth, selectedYear, firstDayOfMonth, lastDayOfMonth;

        window.onload = async () => {
            const now = new Date();
            document.getElementById('sel-month').value = now.getMonth();
            document.getElementById('sel-year').value = now.getFullYear();
            window.updateDateContext();
            await initSystem();
        };

        window.updateDateContext = () => {
            selectedMonth = parseInt(document.getElementById('sel-month').value);
            selectedYear = parseInt(document.getElementById('sel-year').value);
            
            const y = selectedYear;
            const m = (selectedMonth + 1).toString().padStart(2, '0');

            firstDayOfMonth = `${y}-${m}-01`;
            const lastDayObj = new Date(selectedYear, selectedMonth + 1, 0);
            lastDayOfMonth = `${y}-${m}-${lastDayObj.getDate()}`;

            if (currentEmp) generate(currentEmp.nom + " " + currentEmp.prenom);

            const btn = document.querySelector('button[onclick="updateDateContext()"] i');
            if(btn) {
                btn.classList.add('fa-spin');
                setTimeout(() => btn.classList.remove('fa-spin'), 500);
            }
        };

        async function initSystem() {
            const { data: list } = await fromAgence('employes').select('nom, prenom, email, poste, echelon').order('nom');
            if (list) {
                employeeList = list;
                document.getElementById('HeadlineList').innerHTML = list.map(e => `<option value="${e.nom} ${e.prenom}">`).join('');
                document.getElementById('status-grille').innerHTML = `<i class="fas fa-check-circle text-green-500 mr-2"></i> Système Actif`;
            } else {
                document.getElementById('status-grille').innerHTML = `<i class="fas fa-exclamation-triangle text-ha-red mr-2"></i> Err BDD`;
            }
        }

        document.getElementById('Headline').addEventListener('change', (e) => {
            const val = e.target.value;
            const emp = employeeList.find(x => (x.nom + " " + x.prenom) === val);
            if (emp && !selectedEmps.find(s => s.email === emp.email)) {
                selectedEmps.push(emp);
                renderSelectedTags();
                currentEmp = emp;
                generate(val);
            }
            e.target.value = "";
        });

        function renderSelectedTags() {
            const container = document.getElementById('selected-employees-tags');
            container.innerHTML = selectedEmps.map(emp => `
                <span class="bg-neutral-900 border border-blue-500/30 text-white text-[10px] font-mono font-bold px-3 py-1.5 rounded-lg flex items-center gap-3 shadow-inner group">
                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                    ${emp.nom} ${emp.prenom}
                    <button onclick="removeSelected('${emp.email}')" class="text-neutral-500 group-hover:text-ha-red transition-colors outline-none"><i class="fas fa-times"></i></button>
                </span>
            `).join('');
        }

        window.removeSelected = (email) => {
            selectedEmps = selectedEmps.filter(e => e.email !== email);
            renderSelectedTags();
            if (selectedEmps.length > 0) {
                currentEmp = selectedEmps[selectedEmps.length - 1];
                generate(currentEmp.nom + " " + currentEmp.prenom);
            } else {
                document.getElementById('primes-interface').classList.add('hidden');
                currentEmp = null;
            }
        };

        // BATCH ALL
        document.getElementById('btn-batch-all').addEventListener('click', () => {
            selectedEmps = [...employeeList];
            renderSelectedTags();
            if (selectedEmps.length > 0) {
                currentEmp = selectedEmps[selectedEmps.length - 1];
                generate(currentEmp.nom + " " + currentEmp.prenom);
            }
        });

        document.getElementById('btn-save-prime').addEventListener('click', async () => {
            if (selectedEmps.length === 0) return;

            const primeId = document.getElementById('edit-prime-id').value;
            const date = document.getElementById('prime-day-select').value;
            const reason = document.getElementById('prime-reason').value || "Ajustement salarial";
            const amount = parseFloat(document.getElementById('prime-amount').value);

            if (!date || isNaN(amount) || amount === 0) {
                Swal.fire({title:"Attention", text:"Entrée invalide.", icon:"warning", background:'#111', color:'#fff'});
                return;
            }

            Swal.fire({ title: 'Traitement...', allowOutsideClick: false, background:'#111', color:'#fff', didOpen: () => Swal.showLoading() });

            try {
                if (primeId) {
                    await fromAgence('primes_exceptionnelles').update({
                        date_prime: date, motif: reason, montant: amount
                    }).eq('id', primeId);
                } else {
                    const inserts = selectedEmps.map(emp => ({
                        email: emp.email, date_prime: date, motif: reason, montant: amount
                    }));
                    await fromAgence('primes_exceptionnelles').insert(inserts);
                }

                cancelEdit();
                generate(currentEmp.nom + " " + currentEmp.prenom);
                Swal.fire({title:"Opération réalisée", icon:"success", timer: 1500, showConfirmButton: false, background:'#111', color:'#fff'});
            } catch (err) {
                Swal.fire({title:"Erreur BDD", text:err.message, icon:"error", background:'#111', color:'#fff'});
            }
        });

        window.editPrime = (id, date, motif, montant) => {
            document.getElementById('edit-mode-indicator').classList.remove('hidden');
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            document.getElementById('btn-save-text').innerText = "Mettre à jour";

            document.getElementById('edit-prime-id').value = id;
            document.getElementById('prime-day-select').value = date;
            document.getElementById('prime-reason').value = motif;
            document.getElementById('prime-amount').value = montant;
        };

        window.deletePrime = async (primeId) => {
            const confirm = await Swal.fire({
                title: 'Annuler Opération ?', icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#e11d48',
                background: '#111', color: '#fff', customClass: {popup: 'border border-white/10'}
            });
            if (confirm.isConfirmed) {
                const { error } = await fromAgence('primes_exceptionnelles').delete().eq('id', primeId);
                if (!error) generate(`${currentEmp.nom} ${currentEmp.prenom}`);
            }
        };

        function cancelEdit() {
            document.getElementById('edit-mode-indicator').classList.add('hidden');
            document.getElementById('btn-cancel-edit').classList.add('hidden');
            document.getElementById('btn-save-text').innerText = "Valider";
            document.getElementById('edit-prime-id').value = "";
            document.getElementById('prime-reason').value = "";
            document.getElementById('prime-amount').value = "";
        }
        document.getElementById('btn-cancel-edit').addEventListener('click', cancelEdit);

        async function generate(fullName) {
            if (!fullName) return;
            const [nom, ...pre] = fullName.split(' ');
            const prenom = pre.join(' ');
            let emp = employeeList.find(e => e.nom === nom && e.prenom === prenom);
            if (!emp) return;

            currentEmp = emp;

            const [servRes, primeRes] = await Promise.all([
                fromAgence('assurance_sante').select('date_service').eq('email', emp.email).eq('statut', 'valide'),
                fromAgence('primes_exceptionnelles').select('*').eq('email', emp.email).gte('date_prime', firstDayOfMonth).lte('date_prime', lastDayOfMonth)
            ]);

            loadedPrimes = primeRes.data || [];
            
            const container = document.getElementById('active-primes-list');
            container.innerHTML = loadedPrimes.map(p => {
                const isNeg = parseFloat(p.montant) < 0;
                const style = isNeg ? 'text-ha-red bg-ha-red/10 border-ha-red/30' : 'text-blue-400 bg-blue-500/10 border-blue-500/30';
                const sign = isNeg ? "" : "+";

                return `
                <div class="border ${style} text-[10px] px-3 py-1.5 rounded-lg flex items-center gap-3 cursor-pointer hover:bg-black transition-colors shadow-inner"
                     onclick="editPrime('${p.id}', '${p.date_prime}', '${p.motif}', ${p.montant})">
                    <span class="font-mono font-bold">${new Date(p.date_prime).toLocaleDateString()}</span> 
                    <span class="text-white">${p.motif}</span> 
                    <span class="font-black">${sign}${parseFloat(p.montant).toFixed(0)}$</span> 
                    <button onclick="event.stopPropagation(); deletePrime('${p.id}')" class="text-neutral-500 hover:text-white ml-1 outline-none"><i class="fas fa-times"></i></button>
                </div>`;
            }).join('');

            const selectDate = document.getElementById('prime-day-select');
            const workDays = [...new Set((servRes.data || []).map(s => s.date_service))].sort();
            
            const currentSelectValue = selectDate.value;
            selectDate.innerHTML = workDays.length > 0
                ? workDays.map(d => `<option value="${d}">${new Date(d).toLocaleDateString()}</option>`).join('')
                : `<option value="${new Date().toISOString().split('T')[0]}">${new Date().toLocaleDateString()} (Par défaut)</option>`;

            if (currentSelectValue && workDays.includes(currentSelectValue)) selectDate.value = currentSelectValue;

            document.getElementById('primes-interface').classList.remove('hidden');
        }
    </script>
</body>
</html>
