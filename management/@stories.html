<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>Howard Armory — Stories Central</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode:'class', theme:{ extend:{ fontFamily:{ sans:['Inter','sans-serif'], display:['Outfit','sans-serif'], mono:['Share Tech Mono','monospace'] }, colors:{ neutral:{ 850:'#1a1a1a', 900:'#111111', 950:'#070707' }, ha:{ red:'#E63946', gold:'#D4AF37' } } } } }
    </script>
    <style>
        body { font-family:'Inter',sans-serif; background-color:#070707; }
        .glass-card { background:rgba(20,20,20,0.6); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.05); transition:all 0.3s ease; }
        .glass-card:hover { border-color:rgba(212,175,55,0.25); }
        .field { width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:0.75rem; padding:0.65rem 0.9rem; color:#d4d4d4; font-family:'Share Tech Mono',monospace; font-size:0.8125rem; outline:none; transition:border-color 0.3s; }
        .field:focus { border-color:#D4AF37; }
        #editor { min-height:120px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:0.75rem; padding:0.75rem 0.9rem; color:#d4d4d4; font-size:0.875rem; outline:none; transition:border-color 0.3s; }
        #editor:focus { border-color:#D4AF37; }
        .btn-gold { background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.4); color:#D4AF37; padding:0.45rem 1rem; border-radius:0.6rem; font-size:0.65rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:0.3rem; }
        .btn-gold:hover { background:#D4AF37; color:#000; }
        .btn-ghost { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); color:#737373; padding:0.45rem 0.9rem; border-radius:0.6rem; font-size:0.65rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.08em; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:0.3rem; }
        .btn-ghost:hover { color:#fff; border-color:rgba(255,255,255,0.2); }
        .btn-red { background:rgba(230,57,70,0.1); border:1px solid rgba(230,57,70,0.4); color:#E63946; padding:0.45rem 0.9rem; border-radius:0.6rem; font-size:0.65rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.08em; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:0.3rem; }
        .btn-red:hover { background:#E63946; color:#fff; }
        .story-card { height:280px; position:relative; border-radius:1rem; overflow:hidden; cursor:pointer; transition:all 0.3s ease; }
        .story-card:hover { transform:scale(1.02); box-shadow:0 20px 40px rgba(0,0,0,0.5); }
        .dark-scrollbar::-webkit-scrollbar{width:6px;} .dark-scrollbar::-webkit-scrollbar-track{background:transparent;} .dark-scrollbar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
        #modalContent > * { margin-top:0.5em; margin-bottom:0.5em; }
    </style>
</head>
<body class="text-white selection:bg-ha-gold/30 overflow-y-auto dark-scrollbar min-h-screen" perms.pages="2;50;rh;page.stories">
    <div id="session/howard"></div>
    <script src="/HA-EE/src/javascript/menu.js"></script>
    <div id="menu"></div>

    <main class="max-w-6xl mx-auto p-4 lg:p-8 space-y-8 mt-4 pb-24">

        <!-- HEADER -->
        <div class="border-b border-white/10 pb-6 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-display font-black uppercase tracking-tight">
                    Stories <span class="text-ha-gold">Central</span>
                </h1>
                <p class="text-xs font-mono text-neutral-500 mt-2 tracking-widest uppercase"><i class="fas fa-book-open mr-2"></i>Gestion des récits publiés</p>
            </div>
            <div id="profile" class="flex items-center gap-2 text-xs font-mono text-neutral-500 uppercase tracking-widest">
                <span class="text-ha-gold">Admin:</span>
                <div id="db_nom"></div>
            </div>
        </div>

        <!-- FORM CREATION/EDITION -->
        <div class="glass-card rounded-2xl p-6 relative overflow-hidden">
            <i class="fas fa-feather-pointed absolute -right-6 -bottom-6 text-8xl text-ha-gold/10 rotate-12"></i>
            <h2 class="text-sm font-mono uppercase tracking-widest text-neutral-400 mb-5"><i class="fas fa-pen mr-2 text-ha-gold"></i>Administration & Création</h2>
            <form id="storyForm" class="relative z-10 space-y-5">
                <input type="hidden" id="storyId">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] font-mono uppercase tracking-widest text-neutral-500 block mb-1.5">Titre de la story</label>
                        <input id="titre" placeholder="Titre de la story" class="field">
                    </div>
                    <div>
                        <label class="text-[9px] font-mono uppercase tracking-widest text-neutral-500 block mb-1.5">URL image (vide = fallback)</label>
                        <input id="image_url" placeholder="https://..." class="field">
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-mono uppercase tracking-widest text-neutral-500 block mb-1.5">Contenu <span class="text-neutral-700">(Éditeur HTML filtré)</span></label>
                    <div class="flex gap-2 mb-2">
                        <button type="button" id="btnBold" class="btn-gold font-bold">B</button>
                        <button type="button" id="btnItalic" class="btn-ghost italic">I</button>
                        <button type="button" id="btnLink" class="btn-ghost"><i class="fas fa-link text-xs"></i>Lien</button>
                    </div>
                    <div id="editor" contenteditable="true" spellcheck="false"></div>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button id="saveBtn" type="button" class="btn-gold"><i class="fas fa-paper-plane"></i>Publier</button>
                    <button id="updateBtn" type="button" class="btn-ghost"><i class="fas fa-save"></i>Mettre à jour</button>
                    <button id="cancelEdit" type="button" class="btn-red"><i class="fas fa-times"></i>Annuler</button>
                </div>
            </form>
        </div>

        <!-- STORIES GRID -->
        <div>
            <h2 class="text-sm font-mono uppercase tracking-widest text-neutral-500 mb-4"><i class="fas fa-book-open mr-2"></i>Histoires publiées</h2>
            <div id="storiesRow" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"></div>
        </div>
    </main>

    <!-- MODAL LECTURE -->
    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div id="modalBackdrop" class="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
        <div class="relative z-10 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto rounded-2xl bg-neutral-900 shadow-2xl border border-white/10 dark-scrollbar">
            <div id="modalImageWrapper" class="relative p-8">
                <div class="absolute inset-0 bg-cover bg-center opacity-40" id="modalBgImg"></div>
                <div class="absolute inset-0 bg-gradient-to-b from-transparent to-neutral-900"></div>
                <div class="relative z-10 flex flex-col items-center">
                    <h2 id="modalTitle" class="text-4xl font-display font-black text-white text-center drop-shadow-lg"></h2>
                    <h6 id="modalAuthor" class="text-sm text-ha-gold italic mt-3 text-center mb-6 font-mono"></h6>
                    <div id="modalContent" class="prose prose-invert max-w-full text-neutral-200 w-full text-sm leading-relaxed"></div>
                </div>
            </div>
            <div class="p-4 border-t border-white/10 flex justify-end">
                <button id="modalClose" class="btn-ghost"><i class="fas fa-times mr-1"></i>Fermer</button>
            </div>
        </div>
    </div>

    <script src="/HA-EE/src/javascript/footer.js"></script>
    <div id="footer"></div>

    <script type="module">
        import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

        const STORIES_TABLE = 'stories';
        const FALLBACK_IMAGE = 'https://howardarmory.vercel.app/hlward-armory-fallback.jpg';
        const allowedTags = ['P','BR','STRONG','EM','UL','OL','LI','A','IMG','B','I'];
        const MAX_TITLE_LENGTH = 25;

        function getSessionEmail(){try{const s=localStorage.getItem('compte');if(!s)return null;return JSON.parse(s).email?.trim()||null;}catch{return null;}}

        async function fetchAuthorProfile(email){if(!email)return null;const{data,error}=await fromAgence('employes').select('*').eq('email',email).single();if(error)return null;return{nom:(data.nom||'').toUpperCase(),prenom:data.prenom||'',metier:data.poste||'',raw:data};}

        function sanitizeHtml(dirtyHtml){const t=document.createElement('template');t.innerHTML=dirtyHtml||'';const walk=(node)=>{if(node.nodeType===Node.TEXT_NODE)return;if(!allowedTags.includes(node.nodeName)){const p=node.parentNode;while(node.firstChild)p.insertBefore(node.firstChild,node);p.removeChild(node);return;}const aa={'A':['href','target','rel'],'IMG':['src','alt','width','height']};const attrs=Array.from(node.attributes||[]);for(const a of attrs){const n=a.name.toLowerCase();if(!((aa[node.nodeName]||[]).includes(n))){node.removeAttribute(a.name);}else if((n==='href'||n==='src')&&a.value&&!/^(https?:|data:|\/)/.test(a.value)){node.removeAttribute(a.name);}}};t.content.querySelectorAll('*').forEach(walk);return t.innerHTML;}

        const storiesRow=document.getElementById('storiesRow');
        const modal=document.getElementById('modal');
        const modalTitle=document.getElementById('modalTitle');
        const modalAuthor=document.getElementById('modalAuthor');
        const modalContent=document.getElementById('modalContent');
        const modalBgImg=document.getElementById('modalBgImg');
        const editor=document.getElementById('editor');

        document.getElementById('btnBold').addEventListener('click',()=>document.execCommand('insertHTML',false,'<strong>'+getSelectionText()+'</strong>'));
        document.getElementById('btnItalic').addEventListener('click',()=>document.execCommand('insertHTML',false,'<em>'+getSelectionText()+'</em>'));
        document.getElementById('btnLink').addEventListener('click',()=>{const u=prompt('URL (https://...)');if(!u)return;const t=getSelectionText()||u;document.execCommand('insertHTML',false,`<a href="${u}" target="_blank" rel="noopener noreferrer">${t}</a>`);});
        function getSelectionText(){const s=window.getSelection();return s&&s.toString()?s.toString():'';}

        async function fetchStories(){const{data,error}=await fromAgence('stories').select('*').order('date_post',{ascending:false});if(error){console.error(error);return [];}return data||[];}
        async function createStory(p){const{data,error}=await insertAgence('stories', [p]).select().single();if(error)throw error;return data;}
        async function updateStory(id,p){const{data,error}=await fromAgence('stories').update(p).eq('id',id).select().single();if(error)throw error;return data;}
        async function deleteStory(id){const{error}=await fromAgence('stories').delete().eq('id',id);if(error)throw error;}

        async function startEditStory(id){const{data,error}=await fromAgence('stories').select('*').eq('id',id).single();if(error||!data)return alert('Impossible.');document.getElementById('storyId').value=data.id;document.getElementById('titre').value=data.titre||'';document.getElementById('image_url').value=data.image_url||'';editor.innerHTML=data.contenu_html||'';window.scrollTo({top:0,behavior:'smooth'});}
        function resetForm(){document.getElementById('storyId').value='';document.getElementById('titre').value='';document.getElementById('image_url').value='';editor.innerHTML='';}
        function escapeHtml(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

        function renderStories(stories){
            storiesRow.innerHTML='';
            if(!stories.length){storiesRow.innerHTML='<div class="col-span-4 text-center py-12 border border-dashed border-white/10 rounded-2xl text-neutral-600 font-mono text-sm uppercase tracking-widest"><i class="fas fa-ghost text-2xl mb-3 block opacity-40"></i>Aucune story publiée.</div>';return;}
            stories.forEach(story=>{
                const card=document.createElement('div');
                card.className='story-card';
                const img=story.image_url||FALLBACK_IMAGE;
                const title=story.titre||'';
                const short=title.length>MAX_TITLE_LENGTH?title.substring(0,MAX_TITLE_LENGTH)+'...':title;
                card.innerHTML=`
                    <div class="absolute inset-0 bg-cover bg-center" style="background-image:url('${escapeHtml(img)}');filter:brightness(.35)"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                    <div class="absolute inset-0 p-4 flex flex-col justify-end z-10">
                        <h4 class="text-lg font-display font-bold text-ha-gold drop-shadow leading-tight">${escapeHtml(short)}</h4>
                        <p class="text-[9px] font-mono text-neutral-400 uppercase tracking-widest mt-0.5 truncate">${escapeHtml(story.auteur_email||'')}</p>
                        <div class="flex gap-1.5 mt-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button data-action="edit" data-id="${story.id}" class="text-[9px] font-mono uppercase tracking-widest border border-white/20 text-white/70 hover:text-white px-2 py-1 rounded-lg transition-all bg-black/60">Modifier</button>
                            <button data-action="del" data-id="${story.id}" class="text-[9px] font-mono uppercase tracking-widest border border-ha-red/40 text-ha-red/70 hover:text-white hover:bg-ha-red px-2 py-1 rounded-lg transition-all bg-black/60">Suppr.</button>
                        </div>
                    </div>
                `;
                card.classList.add('group');
                card.addEventListener('click',e=>{if(e.target.closest('button'))return;openModal(story);});
                card.querySelectorAll('button').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();const act=b.dataset.action,id=b.dataset.id;if(act==='edit')await startEditStory(parseInt(id));if(act==='del'&&confirm('Supprimer définitivement ?')){await deleteStory(parseInt(id));refresh();}}));
                storiesRow.appendChild(card);
            });
        }

        function openModal(story){
            const img=story.image_url||FALLBACK_IMAGE;
            modalBgImg.style.backgroundImage=`url('${escapeHtml(img)}')`;
            modalTitle.textContent=story.titre||'';
            fetchAuthorProfile(story.auteur_email).then(p=>{modalAuthor.textContent=p?`${p.nom} ${p.prenom} — ${p.metier}`:story.auteur_email||'';});
            modalContent.innerHTML=sanitizeHtml(story.contenu_html||'');
            modal.classList.remove('hidden');modal.classList.add('flex');
        }

        document.getElementById('modalClose').addEventListener('click',()=>{modal.classList.add('hidden');modal.classList.remove('flex');});
        document.getElementById('modalBackdrop').addEventListener('click',()=>{modal.classList.add('hidden');modal.classList.remove('flex');});

        document.getElementById('saveBtn').addEventListener('click',async()=>{const email=getSessionEmail();if(!email)return alert('Aucun compte en session.');const titre=document.getElementById('titre').value.trim();const image_url=document.getElementById('image_url').value.trim();const rawHtml=editor.innerHTML.trim();if(!titre||!rawHtml)return alert('Titre et contenu requis.');try{await createStory({titre,image_url:image_url||null,contenu_html:sanitizeHtml(rawHtml),auteur_email:email,date_post:new Date().toISOString()});resetForm();await refresh();}catch{alert('Erreur création');}});
        document.getElementById('updateBtn').addEventListener('click',async()=>{const id=document.getElementById('storyId').value;if(!id)return alert('Aucune story sélectionnée.');const titre=document.getElementById('titre').value.trim();const image_url=document.getElementById('image_url').value.trim();const rawHtml=editor.innerHTML.trim();if(!titre||!rawHtml)return alert('Titre et contenu requis.');try{await updateStory(parseInt(id),{titre,image_url:image_url||null,contenu_html:sanitizeHtml(rawHtml),date_post:new Date().toISOString()});resetForm();await refresh();}catch{alert('Erreur update');}});
        document.getElementById('cancelEdit').addEventListener('click',e=>{e.preventDefault();resetForm();});

        async function refresh(){const stories=await fetchStories();renderStories(stories);}

        (async function init(){const email=getSessionEmail();if(email){const p=await fetchAuthorProfile(email);document.getElementById('db_nom').textContent=p?`${p.nom} ${p.prenom} — ${p.metier}`:email;}else{document.getElementById('db_nom').textContent='Aucun compte (Admin)';}await refresh();})();
    </script>
</body>
</html>
