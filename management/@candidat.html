<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- E-CDE Account & Security Soft -->
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>Howard Armory - Candidatures</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        neutral: { 850: '#1a1a1a', 900: '#111111', 950: '#070707' },
                        ha: { red: '#E63946', gold: '#D4AF37' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070707; }

        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(-2px); }
        .dark-scrollbar::-webkit-scrollbar { width: 6px; }
        .dark-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        
        .badge-accepter { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .badge-refuser { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .badge-attente { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
    </style>
</head>

<body class="text-white selection:bg-ha-gold/30 h-screen overflow-y-auto dark-scrollbar">
    <div id="session/howard"></div>
    <script src="/HA-EE/src/javascript/menu.js"></script>
    <div id="menu"></div>

    <main id="content" class="w-full max-w-6xl mx-auto px-4 lg:px-8 py-8 space-y-8">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between md:items-end gap-4 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-3xl md:text-5xl font-display font-black tracking-tight uppercase text-white drop-shadow-lg">
                    Candidatures <span class="text-ha-gold">HA</span>
                </h1>
                <p class="text-xs text-neutral-400 font-mono tracking-widest uppercase mt-2">
                    <i class="fa-solid fa-folder-open mr-2"></i>Gestionnaire des dossiers de recrutement
                </p>
            </div>
            <div class="flex gap-2 items-center">
                <span id="count-badge" class="text-[10px] bg-neutral-900 border border-white/10 px-3 py-1.5 rounded-lg font-mono text-neutral-400">0 DOSSIERS</span>
            </div>
        </div>

        <!-- LISTE CANDIDATS -->
        <div>
            <h2 class="text-sm font-mono uppercase tracking-widest text-neutral-500 mb-4">Dossiers Actifs</h2>
            <div id="candidats" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- DETAIL PANNEL -->
        <div id="details" class="hidden glass-card rounded-2xl p-6 lg:p-8 space-y-6 border-ha-gold/20">
            <div class="flex justify-between items-start">
                <div>
                    <h2 class="text-2xl font-display font-bold uppercase tracking-tight">Dossier <span class="text-ha-gold" id="detail-candidat-id">—</span></h2>
                    <p class="text-xs font-mono text-neutral-500 uppercase tracking-widest mt-1">Réponses enregistrées</p>
                </div>
                <!-- Actions Globales -->
                <div class="flex flex-col sm:flex-row gap-2 items-end">
                    <select id="etatGlobal" class="text-xs font-mono bg-neutral-900 border border-white/10 text-neutral-300 px-3 py-2 rounded-lg focus:border-ha-gold outline-none">
                        <option value="">— Définir un état —</option>
                        <option value="accepter">✅ Accepté</option>
                        <option value="refuser">❌ Refusé</option>
                        <option value="attente">⏳ En attente</option>
                    </select>
                    <button onclick="updateEtatGlobal()" class="text-xs font-mono uppercase tracking-widest bg-blue-600/20 border border-blue-500/30 text-blue-400 hover:bg-blue-500 hover:text-white px-3 py-2 rounded-lg transition-all">
                        <i class="fas fa-save mr-1"></i> Appliquer
                    </button>
                    <button onclick="deleteAllReponses()" class="text-xs font-mono uppercase tracking-widest bg-red-600/20 border border-red-500/30 text-ha-red hover:bg-ha-red hover:text-white px-3 py-2 rounded-lg transition-all">
                        <i class="fas fa-trash mr-1"></i> Supprimer
                    </button>
                    <button onclick="fermerDetails()" class="text-xs font-mono uppercase tracking-widest bg-neutral-800 border border-white/10 text-neutral-400 hover:text-white px-3 py-2 rounded-lg transition-all">
                        <i class="fas fa-times mr-1"></i> Fermer
                    </button>
                </div>
            </div>

            <div id="reponses" class="space-y-3 max-h-[60vh] overflow-y-auto dark-scrollbar pr-2"></div>
        </div>
    </main>

    <script src="/HA-EE/src/javascript/footer.js"></script>
    <div id="footer"></div>

    <script type="module">
        import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

        const candidatsDiv = document.getElementById("candidats");
        const detailsDiv = document.getElementById("details");
        const reponsesDiv = document.getElementById("reponses");
        const countBadge = document.getElementById("count-badge");
        let currentCandidat = null;

        function getBadgeClass(etat) {
            if (etat === 'accepter') return 'badge-accepter';
            if (etat === 'refuser') return 'badge-refuser';
            return 'badge-attente';
        }

        async function chargerCandidats() {
            const { data, error } = await supabase
                .from("candidat_result")
                .select("candidat_id, created_at, etat")
                .order("created_at", { ascending: false });

            if (error) return console.error(error);

            const unique = {};
            data.forEach(r => { if (!unique[r.candidat_id]) unique[r.candidat_id] = r; });

            const items = Object.values(unique);
            countBadge.innerText = `${items.length} DOSSIERS`;
            candidatsDiv.innerHTML = "";

            items.forEach(c => {
                const card = document.createElement("div");
                card.className = "glass-card rounded-xl p-5 flex flex-col gap-3 cursor-pointer group";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="text-xs font-mono text-neutral-500 uppercase tracking-widest">Dossier</div>
                        <span class="text-[10px] font-mono font-bold px-2 py-1 rounded-full uppercase tracking-widest ${getBadgeClass(c.etat)}">${c.etat}</span>
                    </div>
                    <p class="text-ha-gold font-display font-bold text-lg tracking-tight">#${c.candidat_id}</p>
                    <p class="text-[10px] font-mono text-neutral-600 uppercase tracking-widest">${new Date(c.created_at).toLocaleString('fr-FR')}</p>
                    <button class="mt-2 w-full text-xs font-mono uppercase tracking-widest py-2 rounded-lg border border-white/10 text-neutral-400 group-hover:border-ha-gold group-hover:text-ha-gold transition-all">
                        <i class="fas fa-folder-open mr-2"></i>Ouvrir le dossier
                    </button>
                `;
                card.querySelector("button").addEventListener("click", () => afficherDetails(c.candidat_id));
                candidatsDiv.appendChild(card);
            });
        }

        async function afficherDetails(candidatId) {
            currentCandidat = candidatId;
            document.getElementById('detail-candidat-id').innerText = candidatId;
            const { data, error } = await fromAgence('candidat_result').select("*").eq("candidat_id", candidatId);
            if (error) return console.error(error);

            detailsDiv.classList.remove("hidden");
            reponsesDiv.innerHTML = "";

            data.forEach(rep => {
                const div = document.createElement("div");
                div.className = "bg-black/50 border border-white/5 rounded-xl p-4 flex justify-between items-center gap-4 hover:border-white/10 transition-all";
                div.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <p class="text-[10px] font-mono uppercase tracking-widest text-neutral-500 mb-1">${rep.cle}</p>
                        <p class="text-sm text-neutral-200 font-medium truncate valeur">${rep.valeur}</p>
                        <p class="text-[9px] font-mono mt-1 uppercase tracking-widest ${getBadgeClass(rep.etat).split(' ')[1] || 'text-neutral-600'}">${rep.etat}</p>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="editReponse('${rep.id}', '${rep.valeur}')" class="w-8 h-8 rounded-lg bg-amber-500/10 border border-amber-500/30 text-amber-400 hover:bg-amber-500 hover:text-white transition-all text-xs flex items-center justify-center"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteReponse('${rep.id}')" class="w-8 h-8 rounded-lg bg-red-500/10 border border-red-500/30 text-ha-red hover:bg-ha-red hover:text-white transition-all text-xs flex items-center justify-center"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                reponsesDiv.appendChild(div);
            });

            detailsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        window.fermerDetails = () => { detailsDiv.classList.add("hidden"); currentCandidat = null; }

        window.editReponse = async (id, valeur) => {
            const nv = prompt("Nouvelle valeur:", valeur);
            if (!nv) return;
            const { error } = await fromAgence('candidat_result').update({ valeur: nv }).eq("id", id);
            if (error) console.error(error);
            else afficherDetails(currentCandidat);
        }

        window.deleteReponse = async (id) => {
            if (!confirm("Supprimer cette réponse ?")) return;
            const { error } = await fromAgence('candidat_result').delete().eq("id", id);
            if (error) console.error(error);
            else afficherDetails(currentCandidat);
        }

        window.updateEtatGlobal = async () => {
            const etat = document.getElementById("etatGlobal").value;
            if (!etat) return alert("Choisis un état !");
            const { error } = await fromAgence('candidat_result').update({ etat }).eq("candidat_id", currentCandidat);
            if (error) console.error(error);
            else { await afficherDetails(currentCandidat); await chargerCandidats(); }
        }

        window.deleteAllReponses = async () => {
            if (!confirm("Supprimer toutes les réponses de ce candidat ?")) return;
            const { error } = await fromAgence('candidat_result').delete().eq("candidat_id", currentCandidat);
            if (error) console.error(error);
            else { fermerDetails(); await chargerCandidats(); }
        }

        chargerCandidats();
    </script>
</body>
</html>
