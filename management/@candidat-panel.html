



<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Howard Armory - Administration UAP</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        neutral: { 850: '#1a1a1a', 900: '#111111', 950: '#070707' },
                        ha: { red: '#E63946', gold: '#D4AF37' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #070707;
            color: white;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dark-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .dark-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .dark-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
    <div perms.pages="2;rh" id="session/howard"></div>
    <script src="/HA-EE/src/javascript/menu.js"></script>
</head>

<body class="selection:bg-ha-gold/30 h-screen overflow-y-auto dark-scrollbar flex flex-col">

    <header class="sticky top-0 inset-x-0 z-50 w-full mt-4 px-4 sm:px-0">
        <nav
            class="relative max-w-7xl w-full mx-auto bg-neutral-900/60 backdrop-blur-lg border border-neutral-700/50 shadow-xl shadow-black/50 rounded-[24px] flex items-center justify-between p-2">
            <div class="flex items-center px-4 gap-4">
                <img class="w-10 h-auto drop-shadow-md" src="https://howardarmory.vercel.app/data/img/favicon.png"
                    alt="Logo">
                <span class="font-display font-bold text-lg uppercase tracking-widest text-ha-gold">Admin HA-UAP</span>
            </div>
            <div class="px-4 flex gap-4">
                <button onclick="loadCandidatures()"
                    class="text-xs font-bold uppercase tracking-widest text-neutral-400 hover:text-white transition-colors">
                    <i class="fas fa-sync-alt mr-1"></i> Rafraîchir
                </button>
            </div>
        </nav>
    </header>

    <main class="w-full max-w-7xl mx-auto p-4 lg:p-8 flex-1 flex flex-col">
        <div class="glass-card p-6 rounded-2xl flex-1 flex flex-col">
            <h1 class="text-3xl font-display font-black uppercase text-white mb-2">Candidatures</h1>
            <p class="text-neutral-500 font-mono text-sm tracking-widest uppercase mb-6 border-b border-white/10 pb-4">
                Gestion des recrutements</p>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-neutral-300 border-collapse whitespace-nowrap">
                    <thead>
                        <tr
                            class="bg-white/5 border-b border-white/10 text-white uppercase text-xs font-mono tracking-widest">
                            <th class="p-4 rounded-tl-lg">Date</th>
                            <th class="p-4">Session ID</th>
                            <th class="p-4">Candidat</th>
                            <th class="p-4">Étape</th>
                            <th class="p-4">Statut</th>
                            <th class="p-4 text-right rounded-tr-lg">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="candidaturesList">
                        <!-- Injecté par JS -->
                        <tr>
                            <td colspan="6" class="p-8 text-center text-neutral-500 font-mono italic">Chargement des
                                données...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Détails Candidat -->
    <div id="candidateModal"
        class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-2xl rounded-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-neutral-900/50">
                <div>
                    <h2 class="text-2xl font-display font-bold uppercase text-white" id="modalName">Nom Prénom</h2>
                    <p class="text-xs font-mono text-neutral-400 mt-1">Session: <span id="modalSession"
                            class="text-ha-gold select-all"></span></p>
                </div>
                <button onclick="closeModal()" class="text-neutral-500 hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <div class="p-6 overflow-y-auto dark-scrollbar space-y-6">
                <!-- Identité -->
                <div>
                    <h3 class="text-sm font-bold uppercase text-ha-gold mb-3 border-b border-ha-gold/30 pb-1">Identité &
                        Contact</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><span class="text-neutral-500 text-xs block uppercase">Date de naissance</span><span
                                id="modalDob" class="text-white"></span></div>
                        <div><span class="text-neutral-500 text-xs block uppercase">Âge</span><span id="modalAge"
                                class="text-white"></span></div>
                        <div><span class="text-neutral-500 text-xs block uppercase">Téléphone</span><span
                                id="modalPhone" class="text-white"></span></div>
                        <div><span class="text-neutral-500 text-xs block uppercase">Email</span><span id="modalEmail"
                                class="text-white"></span></div>
                    </div>
                </div>

                <!-- Progression -->
                <div>
                    <h3 class="text-sm font-bold uppercase text-ha-gold mb-3 border-b border-ha-gold/30 pb-1">
                        Progression & Statut</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm mb-4">
                        <div><span class="text-neutral-500 text-xs block uppercase">Étape Actuelle</span><span
                                id="modalStep" class="text-white"></span></div>
                        <div><span class="text-neutral-500 text-xs block uppercase">Statut</span><span id="modalStatus"
                                class="text-white"></span></div>
                        <div><span class="text-neutral-500 text-xs block uppercase">Tentatives Examen</span><span
                                id="modalAttempts" class="text-white"></span></div>
                    </div>
                </div>

                <!-- Logs -->
                <div>
                    <h3 class="text-sm font-bold uppercase text-ha-gold mb-3 border-b border-ha-gold/30 pb-1">Historique
                        d'activité (Logs)</h3>
                    <div
                        class="bg-black/50 border border-white/5 rounded-xl p-3 max-h-48 overflow-y-auto dark-scrollbar">
                        <ul id="modalLogs" class="text-xs font-mono text-neutral-400 space-y-2">
                            <!-- JS Inject -->
                        </ul>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-white/10 bg-neutral-900/50 flex justify-between items-center">
                <button onclick="closeModal()"
                    class="text-sm font-bold uppercase tracking-widest text-neutral-400 hover:text-white transition-colors">Fermer</button>
                <button id="btnOpenEval"
                    class="bg-ha-red hover:bg-red-800 text-white px-6 py-2 rounded-xl uppercase font-bold tracking-widest text-sm transition-colors shadow-[0_0_15px_rgba(230,57,70,0.3)]">
                    <i class="fas fa-clipboard-check mr-2"></i> Ouvrir la feuille d'évaluation
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="https://howardarmory-ee.vercel.app/HA-EE/src/javascript/candidat.js"></script>
</body>

</html>
