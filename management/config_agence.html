<!DOCTYPE html>
<html lang="fr" class="h-full bg-[#FAF8F5]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.C. — Configuration du Profil Agence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 950: '#FAF8F5', 900: '#F5F1EB', 800: '#EBE4DA', 700: '#DCCFC0' },
                        champagne: { 100: '#1A140E', 200: '#4A3E31', 300: '#D4AF37', 400: '#C5A059', 500: '#AA823C' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #F5EBE0 0%, #D4AF37 50%, #AA823C 100%); }
        .text-gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #AA823C 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tech-grid { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(170, 130, 60, 0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(170, 130, 60, 0.02) 1px, transparent 1px); }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.75); 
            border: 1px solid rgba(220, 207, 192, 0.6);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 35px rgba(170, 130, 60, 0.04);
        }

        .tier-card {
            border: 1px solid rgba(220, 207, 192, 0.6);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .tier-radio:checked + .tier-card {
            border-color: #AA823C;
            background-color: rgba(212, 175, 55, 0.05);
            box-shadow: 0 4px 15px rgba(170, 130, 60, 0.08);
        }
    </style>
</head>
<body class="text-champagne-100 min-h-screen p-4 lg:p-8 relative overflow-x-hidden antialiased tech-grid bg-[#FAF8F5]">

    <div class="max-w-4xl mx-auto w-full relative z-10 my-6">
        
        <header class="flex items-center gap-4 mb-8 border-b border-dark-700/30 pb-6">
            <div class="h-12 w-12 rounded-xl gold-gradient flex items-center justify-center text-white font-bold text-xl shadow-md">▲</div>
            <div>
                <h1 class="text-2xl font-serif text-champagne-100">Enregistrement <span class="italic text-champagne-500">Corporate</span></h1>
                <p class="text-xs font-medium uppercase tracking-widest text-champagne-200/60 mt-0.5">Dossier d'homologation agence_profil</p>
            </div>
        </header>

        <form id="profileForm" class="glass-panel rounded-2xl p-6 lg:p-8 space-y-6">
            
            <div id="statusMessage" class="hidden text-xs font-mono font-bold p-3 rounded-lg text-center"></div>

            <div class="bg-dark-900/60 p-5 rounded-xl border border-dark-700/40 space-y-4">
                <span class="text-[10px] font-bold uppercase tracking-wider text-champagne-500 block"><i class="fa-solid fa-id-card mr-1"></i> Informations Générales (Registre National)</span>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200/70 mb-1">ID Agence</label>
                        <input type="text" id="id_agence" disabled class="w-full bg-dark-800/40 border border-dark-700 text-sm rounded-lg px-3 py-2 text-champagne-200 font-mono focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200/70 mb-1">Nom de l'Entreprise</label>
                        <input type="text" id="nom_entreprise" disabled class="w-full bg-dark-800/40 border border-dark-700 text-sm rounded-lg px-3 py-2 text-champagne-200 font-semibold focus:outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200/70 mb-1">NOM du Résident Fondateur</label>
                        <input type="text" id="createur_nom" disabled class="w-full bg-dark-800/40 border border-dark-700 text-sm rounded-lg px-3 py-2 text-champagne-200 font-bold tracking-wide focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200/70 mb-1">Prénom du Fondateur</label>
                        <input type="text" id="createur_prenom" disabled class="w-full bg-dark-800/40 border border-dark-700 text-sm rounded-lg px-3 py-2 text-champagne-200 font-semibold focus:outline-none">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200 mb-1">Type d'Activité *</label>
                    <select id="type_activite" required class="w-full bg-white border border-dark-700 text-sm rounded-lg px-3 py-2 focus:border-champagne-400 focus:outline-none">
                        <option value="Shop">Shop</option>
                        <option value="FastFood">FastFood</option>
                        <option value="Restaurant">Restaurant</option>
                        <option value="Autre">Autre Industrie</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200 mb-1">Date de création de la boîte *</label>
                    <input type="date" id="date_creation_boite" required class="w-full bg-white border border-dark-700 text-sm rounded-lg px-3 py-2 focus:border-champagne-400 focus:outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200 mb-1">URL Forum de l'Entreprise</label>
                    <input type="url" id="url_forum" placeholder="https://..." class="w-full bg-white border border-dark-700 text-sm rounded-lg px-3 py-2 focus:border-champagne-400 focus:outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200 mb-1">Discord de l'entreprise</label>
                    <input type="text" id="url_discord" placeholder="Invite ou ID" class="w-full bg-white border border-dark-700 text-sm rounded-lg px-3 py-2 focus:border-champagne-400 focus:outline-none">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-200 mb-1">Régime Juridique *</label>
                <div class="flex gap-6 mt-2">
                    <label class="inline-flex items-center text-xs font-semibold cursor-pointer">
                        <input type="radio" name="regime" value="Pro" checked class="text-champagne-500 focus:ring-champagne-400 mr-2"> Professionnel (Pro)
                    </label>
                    <label class="inline-flex items-center text-xs font-semibold cursor-pointer">
                        <input type="radio" name="regime" value="Particulier" class="text-champagne-500 focus:ring-champagne-400 mr-2"> Particulier
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-champagne-500 mb-3">Types d'entreprises & Statut Évolutif</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    
                    <label class="relative block">
                        <input type="radio" name="tier" value="ENO" checked class="tier-radio hidden">
                        <div class="tier-card p-4 rounded-xl h-full flex flex-col bg-white">
                            <span class="text-xs font-bold text-neutral-400">ENO</span>
                            <span class="text-sm font-serif font-medium mt-0.5">Entreprise Non Officielle</span>
                            <p class="text-[10px] text-neutral-400 mt-1 flex-1">Créée sans validation. Aucun avantage accordé.</p>
                        </div>
                    </label>

                    <label class="relative block">
                        <input type="radio" name="tier" value="EO" class="tier-radio hidden">
                        <div class="tier-card p-4 rounded-xl h-full flex flex-col bg-white">
                            <span class="text-xs font-bold text-champagne-400">EO</span>
                            <span class="text-sm font-serif font-medium mt-0.5">Entreprise Officielle</span>
                            <p class="text-[10px] text-neutral-400 mt-1 flex-1">Validée par formulaire. Inclus : Serveur Discord affilié, redirection, 2 véhicules et 5 props personnalisés.</p>
                        </div>
                    </label>

                    <label class="relative block">
                        <input type="radio" name="tier" value="EC" class="tier-radio hidden">
                        <div class="tier-card p-4 rounded-xl h-full flex flex-col bg-white">
                            <span class="text-xs font-bold text-champagne-500">EC</span>
                            <span class="text-sm font-serif font-medium mt-0.5">Entreprise Certifiée</span>
                            <p class="text-[10px] text-neutral-400 mt-1 flex-1">Sessions régulières et qualité distinguée. Avantages EO + 4 véhicules, 10 props et 1 série playermodels.</p>
                        </div>
                    </label>

                    <label class="relative block">
                        <input type="radio" name="tier" value="GE" class="tier-radio hidden">
                        <div class="tier-card p-4 rounded-xl h-full flex flex-col bg-white">
                            <span class="text-xs font-bold text-amber-600">GE</span>
                            <span class="text-sm font-serif font-medium mt-0.5">Grande Entreprise</span>
                            <p class="text-[10px] text-neutral-400 mt-1 flex-1">Fiche Gouvernementale. Avantages EC + catégorie dédiée, 15 props, 2 playermodels et accès aux fonds financiers.</p>
                        </div>
                    </label>

                </div>
            </div>

            <div class="pt-4 flex justify-end">
                <button type="submit" class="gold-gradient text-white font-medium text-xs uppercase tracking-widest px-6 py-3 rounded-xl shadow-md hover:opacity-90 transition-all">
                    <i class="fa-solid fa-building-circle-check mr-2"></i> Enregistrer le Profil Agence
                </button>
            </div>
        </form>
    </div>
    <div id="footer" class="fixed bottom-0 left-0 w-full z-50 transition-transform duration-300">
        <script src="/HA-EE/src/javascript/footer.js" type="module"></script>
    </div>
    <script type="module">
        import { supabase } from '/HA-EE/src/javascript/sp.js';

        async function getHash(string) {
            const utf8 = new TextEncoder().encode(string.toLowerCase().trim());
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const status = document.getElementById('statusMessage');
        let sessionUser = null;

        function showStatus(text, type) {
            status.textContent = text;
            status.className = `text-xs font-mono font-bold p-3 rounded-lg text-center ${
                type === 'error' ? 'bg-red-50 border border-red-200 text-red-600' : 'bg-green-50 border border-green-200 text-green-600'
            }`;
            status.classList.remove('hidden');
        }

        // 1. Extraction et validation de la structure agence_liste
        async function loadStructureData() {
            const token = sessionStorage.getItem('session_token');
            const isAuth = sessionStorage.getItem('isAuth');

            if (!isAuth || !token) {
                window.location.href = "https://howardarmory-ee.vercel.app/HA-EE/src/err/oauth";
                return;
            }

            try {
                // Trouver l'employé connecté
                const { data: employes, error: empError } = await supabase.from('employes').select('*');
                if (empError) throw empError;

                for (const emp of employes) {
                    if (await getHash(emp.email) === token) {
                        sessionUser = emp;
                        break;
                    }
                }

                if (!sessionUser) {
                    showStatus("🚫 Impossible d'identifier votre empreinte utilisateur.", "error");
                    return;
                }

                if (!sessionUser.id_agence) {
                    showStatus("🚨 Compte orphelin : Aucun ID agence ne vous est rattaché.", "error");
                    return;
                }

                // Récupération directe des infos scellées dans agence_liste
                const { data: agenceReg, error: regError } = await supabase
                    .from('agence_liste')
                    .select('*')
                    .eq('id_agence', sessionUser.id_agence)
                    .maybeSingle();

                if (regError) throw regError;

                if (!agenceReg) {
                    showStatus("🚫 L'ID agence lié à votre compte n'existe pas dans le registre agence_liste.", "error");
                    return;
                }

                // Remplissage + Verrouillage strict des données agence_liste
                document.getElementById('id_agence').value = agenceReg.id_agence;
                document.getElementById('nom_entreprise').value = agenceReg.nom_entreprise;
                document.getElementById('createur_nom').value = (agenceReg.createur_nom || "").toUpperCase(); // NOM EN MAJ 🎯
                document.getElementById('createur_prenom').value = agenceReg.createur_prenom || "";

                // 2. Vérification si un profil additionnel agence_profil existe déjà pour le préremplir
                const { data: currentProfil } = await supabase
                    .from('agence_profil')
                    .select('*')
                    .eq('id_agence', agenceReg.id_agence)
                    .maybeSingle();

                if (currentProfil) {
                    document.getElementById('type_activite').value = currentProfil.type_activite || "Shop";
                    if (currentProfil.date_creation_boite) {
                        document.getElementById('date_creation_boite').value = currentProfil.date_creation_boite;
                    }
                    document.getElementById('url_forum').value = currentProfil.url_forum || "";
                    document.getElementById('url_discord').value = currentProfil.url_discord || "";
                    
                    const regimeRadio = document.querySelector(`input[name="regime"][value="${currentProfil.regime_juridique}"]`);
                    if (regimeRadio) regimeRadio.checked = true;

                    const tierRadio = document.querySelector(`input[name="tier"][value="${currentProfil.classification_tier}"]`);
                    if (tierRadio) tierRadio.checked = true;
                }

            } catch (err) {
                console.error(err);
                showStatus("🚨 Erreur critique lors de la synchronisation avec l'A.R.C.", "error");
            }
        }

        // 2. Soumission finale exclusive vers agence_profil
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!sessionUser || !sessionUser.id_agence) {
                showStatus("🚫 Requête rejetée : Session invalide.", "error");
                return;
            }

            const payload = {
                id_agence: sessionUser.id_agence,
                type_etablissement: document.getElementById('type_activite').value, // Renommé
                date_creation_boite: document.getElementById('date_creation_boite').value,
                url_forum: document.getElementById('url_forum').value.trim(),
                url_discord: document.getElementById('url_discord').value.trim(),
                type_compte: document.querySelector('input[name="regime"]:checked').value, // Renommé
                classification: document.querySelector('input[name="tier"]:checked').value // Renommé
                // Supprime date_mise_a_jour, elle n'est pas dans ton CREATE TABLE
            };

            try {
                const { error } = await supabase
                    .from('agence_profil')
                    .upsert(payload, { onConflict: 'id_agence' });

                if (error) throw error;

                showStatus("✅ Fiche agence_profil mise à jour avec succès !", "success");
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                showStatus("❌ Échec de la transaction avec agence_profil.", "error");
            }
        });

        document.addEventListener('DOMContentLoaded', loadStructureData);
    </script>
</body>
</html>
