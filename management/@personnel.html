<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>Howard Armory — Gestion du Personnel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode:'class',
            theme:{ extend:{ fontFamily:{ sans:['Inter','sans-serif'], display:['Outfit','sans-serif'], mono:['Share Tech Mono','monospace'] }, colors:{ neutral:{ 850:'#1a1a1a', 900:'#111111', 950:'#070707' }, ha:{ red:'#E63946', gold:'#D4AF37' } } } }
        }
    </script>
    <style>
        body { font-family:'Inter',sans-serif; background-color:#070707; }
        .glass-card { background:rgba(20,20,20,0.6); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.05); transition:all 0.3s ease; }
        .glass-card:hover { border-color:rgba(230,57,70,0.2); }
        .field { width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:0.75rem; padding:0.6rem 0.9rem; color:#d4d4d4; font-family:'Share Tech Mono',monospace; font-size:0.8125rem; outline:none; transition:border-color 0.3s; }
        .field:focus { border-color:#E63946; }
        .btn-red { background:rgba(230,57,70,0.1); border:1px solid rgba(230,57,70,0.4); color:#E63946; padding:0.4rem 0.9rem; border-radius:0.6rem; font-size:0.65rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; cursor:pointer; transition:all 0.3s; }
        .btn-red:hover { background:#E63946; color:#fff; }
        .btn-ghost { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); color:#737373; padding:0.4rem 0.9rem; border-radius:0.6rem; font-size:0.65rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; cursor:pointer; transition:all 0.3s; }
        .btn-ghost:hover { border-color:rgba(255,255,255,0.2); color:#fff; }
        .dark-scrollbar::-webkit-scrollbar{width:6px;} .dark-scrollbar::-webkit-scrollbar-track{background:transparent;} .dark-scrollbar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
    </style>
</head>
<body class="text-white selection:bg-ha-red/30 overflow-y-auto dark-scrollbar min-h-screen" perms.pages="2;50;rh;page.personnel">
    <div id="session/howard"></div>
    <script src="/HA-EE/src/javascript/menu.js"></script>
    <div id="menu"></div>

    <main class="max-w-6xl mx-auto p-4 lg:p-8 space-y-8 mt-4 pb-24">

        <div class="border-b border-white/10 pb-6">
            <h1 class="text-3xl md:text-4xl font-display font-black uppercase tracking-tight">
                Gestion <span class="text-ha-red">Personnel</span>
            </h1>
            <p class="text-xs font-mono text-neutral-500 mt-2 tracking-widest uppercase"><i class="fas fa-sitemap mr-2"></i>Catégories, Visibilité & Drive RH</p>
        </div>

        <div class="glass-card rounded-2xl p-6 relative overflow-hidden">
            <i class="fas fa-cloud-arrow-up absolute -right-8 -bottom-8 text-9xl text-ha-gold/10"></i>
            <h2 class="text-sm font-mono uppercase tracking-widest text-ha-gold mb-6"><i class="fas fa-terminal mr-2"></i>Terminal de Transfert — G-Drive Personnel</h2>
            <div class="grid lg:grid-cols-2 gap-6 relative z-10">
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-mono uppercase tracking-widest text-neutral-500 block mb-2">Cible du transfert (Personnel)</label>
                        <select id="employeeSelect" class="field">
                            <option value="">Chargement du personnel...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-mono uppercase tracking-widest text-neutral-500 block mb-2">Nouveau Document (PNG, MD, PDF...)</label>
                        <input type="file" id="fileInput" class="field cursor-pointer">
                    </div>
                    <button onclick="handleUpload()" id="uploadBtn" class="w-full btn-red justify-center py-3" style="display:flex;align-items:center;gap:0.5rem">
                        <i class="fas fa-upload"></i> Exécuter l'importation
                    </button>
                    <div id="statusMsg" class="text-[10px] font-mono uppercase text-center tracking-widest text-neutral-500"></div>
                </div>
                <div id="fileManager" class="hidden">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-[9px] font-mono uppercase tracking-widest text-neutral-500">Documents Détectés</h3>
                        <span id="fileCount" class="text-[10px] font-mono text-ha-gold">0</span>
                    </div>
                    <div id="fileList" class="space-y-2 max-h-60 overflow-y-auto dark-scrollbar pr-1"></div>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="glass-card rounded-2xl p-6 space-y-4 h-fit">
                <h2 class="text-sm font-mono uppercase tracking-widest text-neutral-400"><i class="fas fa-tags mr-2 text-ha-red"></i>Configuration</h2>
                <ul id="cat-list" class="space-y-2"></ul>
                <div class="flex gap-2 pt-2 border-t border-white/5">
                    <input id="new-cat-name" class="field flex-1" placeholder="Nouvelle catégorie">
                    <button id="add-cat-btn" class="btn-red"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-8">
                <div class="flex justify-between items-center glass-card p-4 rounded-xl">
                    <h2 class="text-sm font-mono uppercase tracking-widest text-neutral-400"><i class="fas fa-users mr-2 text-ha-red"></i>Effectif Global</h2>
                    <select id="filter-cat" class="field" style="width:auto;font-size:0.7rem;padding:0.4rem 0.8rem">
                        <option value="all">Afficher Tout</option>
                    </select>
                </div>
                
                <div id="emp-sections-container" class="space-y-12">
                    </div>
            </div>
        </div>

        
    </main>

    <script src="/HA-EE/src/javascript/footer.js"></script>
    <div id="footer"></div>

    <script type="module">

    import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

    const CONFIG = { owner:"PKYT-Service", repo:"database_dev", basePath:"NEW*DRIVE/howard_docs", tokenUrl:"https://pkyt-database-up.vercel.app/code-source/E-CDE/Secure-token.js" };
    let GITHUB_TOKEN = "";
    
    // Nouvelle variable globale pour retenir l'ordre actuel
    let currentCategories = [];

    // ---- CATEGORIES ----
    async function loadCategories() {
        // On trie par 'ordre' et plus par 'nom'
        const { data:cats } = await fromAgence('employe_categories').select('*').order('ordre', { ascending: true });
        currentCategories = cats || [];
        
        const catList = document.getElementById('cat-list');
        const filterCat = document.getElementById('filter-cat');
        
        catList.innerHTML = '';
        filterCat.innerHTML = '<option value="all">Afficher Tout</option>';
        
        currentCategories.forEach((cat, index) => {
            const li = document.createElement('li');
            li.className = 'flex justify-between items-center bg-black/40 border border-white/5 rounded-lg px-3 py-2 text-sm font-mono text-neutral-300';
            
            // Les boutons incluent maintenant les flèches haut/bas
            li.innerHTML = `
                <span class="truncate pr-2">${cat.nom}</span>
                <div class="flex gap-1 shrink-0">
                    <button onclick="moveCategory(${index}, -1)" class="btn-ghost" style="padding:0.2rem 0.4rem" title="Monter" ${index === 0 ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}><i class="fas fa-chevron-up text-[10px]"></i></button>
                    <button onclick="moveCategory(${index}, 1)" class="btn-ghost" style="padding:0.2rem 0.4rem" title="Descendre" ${index === currentCategories.length - 1 ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}><i class="fas fa-chevron-down text-[10px]"></i></button>
                    <div class="w-px h-4 bg-white/10 self-center mx-1"></div>
                    <button data-edit-cat="${cat.id}" class="btn-ghost" style="padding:0.2rem 0.5rem"><i class="fas fa-pen text-xs"></i></button>
                    <button data-delete-cat="${cat.id}" class="text-ha-red border border-ha-red/20 hover:bg-ha-red hover:text-white rounded px-1.5 py-0.5 text-xs transition-all"><i class="fas fa-times"></i></button>
                </div>
            `;
            catList.appendChild(li);
            
            const opt = document.createElement('option');
            opt.value = cat.id; 
            opt.textContent = cat.nom;
            filterCat.appendChild(opt);
        });
        
        return currentCategories;
    }

    // Fonction pour bouger les catégories (attachée à window pour fonctionner avec onclick)
    window.moveCategory = async (index, direction) => {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= currentCategories.length) return;

        const cat1 = currentCategories[index];
        const cat2 = currentCategories[newIndex];

        const ordre1 = cat1.ordre || index;
        const ordre2 = cat2.ordre || newIndex;

        await fromAgence('employe_categories').update({ ordre: ordre2 }).eq('id', cat1.id);
        await fromAgence('employe_categories').update({ ordre: ordre1 }).eq('id', cat2.id);

        await loadCategories();
        await loadEmployees();
    };

    // Ajout d'une catégorie (avec le bon ordre)
    document.getElementById('add-cat-btn').addEventListener('click', async () => {
        const name = document.getElementById('new-cat-name').value.trim();
        if(!name) return; 
        
        const nextOrdre = currentCategories.length > 0 ? Math.max(...currentCategories.map(c => c.ordre || 0)) + 1 : 0;
        
        await insertAgence('employe_categories', withAgence({ nom: name, ordre: nextOrdre }); 
        document.getElementById('new-cat-name').value = ''; 
        await loadCategories(); 
        await loadEmployees();
    });

    async function deleteCategory(id) {
        const {data:def} = await fromAgence('employe_categories').select('id').eq('nom','Non trié').limit(1);
        if(def && def.length > 0) {
            await fromAgence('employes').update({categorie_id:def[0].id}).eq('categorie_id',id);
        }
        await fromAgence('employe_categories').delete().eq('id',id);
        await loadCategories(); 
        await loadEmployees();
    }

    async function renameCategory(id) {
        const n = prompt('Nouveau nom:'); 
        if(!n) return;
        await fromAgence('employe_categories').update({nom:n}).eq('id',id);
        await loadCategories(); 
        await loadEmployees();
    }

    // ---- EMPLOYES PAR CATEGORIE ----
    async function loadEmployees() {
        const selectedCatId = document.getElementById('filter-cat').value;
        const container = document.getElementById('emp-sections-container');
        container.innerHTML = '';

        // 1. Récupérer les catégories triées par ORDRE et non par nom
        const { data: categories } = await fromAgence('employe_categories').select('*').order('ordre', { ascending: true });
        let query = fromAgence('employes').select('*').order('nom');
        
        if (selectedCatId !== 'all') {
            query = query.eq('categorie_id', selectedCatId);
        }
        const { data: employes } = await query;

        if (!employes || employes.length === 0) {
            container.innerHTML = '<p class="text-center text-neutral-500 font-mono py-10">AUCUN AGENT DÉTECTÉ DANS LE SYSTÈME</p>';
            return;
        }

        const catsToDisplay = selectedCatId === 'all' 
            ? categories.filter(c => employes.some(e => e.categorie_id === c.id))
            : categories.filter(c => c.id === selectedCatId);

        catsToDisplay.forEach(cat => {
            const section = document.createElement('div');
            section.className = 'space-y-4';
            
            section.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="h-px flex-1 bg-gradient-to-r from-transparent via-ha-red/30 to-transparent"></div>
                    <h3 class="text-ha-red font-mono text-xs uppercase tracking-[0.3em] font-bold">${cat.nom}</h3>
                    <div class="h-px flex-1 bg-gradient-to-r from-transparent via-ha-red/30 to-transparent"></div>
                </div>
                <div class="grid grid-cols-1 gap-6" id="list-${cat.id}"></div>
            `;
            container.appendChild(section);

            const list = document.getElementById(`list-${cat.id}`);
            const catEmployees = employes.filter(e => e.categorie_id === cat.id);

            catEmployees.forEach(emp => {
                const card = document.createElement('div');
                card.className = "glass-card rounded-2xl relative overflow-hidden flex flex-col md:flex-row shadow-2xl transition-all hover:scale-[1.01]";
                card.innerHTML = `
                    <div class="absolute inset-0 bg-gradient-to-br from-ha-gold/5 via-transparent to-transparent pointer-events-none"></div>
                    
                    <div class="w-full md:w-1/3 bg-black/40 p-6 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-white/10 relative overflow-hidden">
                        <i class="fas fa-qrcode absolute -right-6 -bottom-6 text-8xl text-white/5 rotate-12"></i>
                        <div class="w-20 h-20 rounded-2xl bg-neutral-900 border border-ha-gold/30 flex items-center justify-center text-ha-gold mb-4 shadow-[0_0_15px_rgba(212,175,55,0.2)]">
                            <i class="fas fa-user-secret text-3xl"></i>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-mono tracking-widest uppercase text-neutral-500 mb-1">ID: #${emp.id_compte}</p>
                            <p class="text-[10px] font-mono ${emp.visible ? 'text-green-400 bg-green-500/10' : 'text-ha-red bg-ha-red/10'} px-2 py-1 rounded inline-block uppercase font-bold tracking-tighter">
                                ${emp.visible ? 'ACCRÉDITATION ACTIVE' : 'ACCÈS RÉVOQUÉ'}
                            </p>
                        </div>
                    </div>

                    <div class="w-full md:w-2/3 p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-2xl font-display font-bold uppercase tracking-tight">${emp.prenom} <span class="text-ha-red">${emp.nom}</span></h2>
                                <span class="text-[10px] font-mono tracking-widest text-ha-gold opacity-70">${emp.email}</span>
                            </div>
                            <div class="flex flex-col gap-2">
                                 <select class="cat-change field text-[10px] py-1 h-8 w-32" data-id="${emp.id_compte}">
                                    ${categories.map(c => `<option value="${c.id}" ${c.id === emp.categorie_id ? 'selected' : ''}>${c.nom}</option>`).join('')}
                                 </select>
                                 <button class="toggle-vis btn-ghost !text-[9px]" data-toggle="${emp.id_compte}">
                                    ${emp.visible ? 'DÉSACTIVER' : 'RÉACTIVER'}
                                 </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-[9px] text-neutral-500 uppercase font-mono tracking-widest mb-1">Poste Assigné</p>
                                <p class="font-bold text-xs bg-neutral-900/50 px-3 py-2 rounded-lg border border-white/5 truncate">${emp.poste || 'NON ASSIGNÉ'}</p>
                            </div>
                            <div>
                                <p class="text-[9px] text-neutral-500 uppercase font-mono tracking-widest mb-1">Statut Présence</p>
                                <p class="font-bold text-xs bg-neutral-900/50 px-3 py-2 rounded-lg border border-white/5 inline-block ${emp.presence ? 'text-green-400' : 'text-neutral-500'}">
                                    ${emp.presence ? 'EN SERVICE' : 'HORS LIGNE'}
                                </p>
                            </div>
                            <div>
                                <p class="text-[9px] text-neutral-500 uppercase font-mono tracking-widest mb-1">Échelon Civil</p>
                                <p class="font-mono text-xs text-neutral-300 px-1">${emp.echelon || '?'}</p>
                            </div>
                            <div>
                                <p class="text-[9px] text-neutral-500 uppercase font-mono tracking-widest mb-1">Date de Naissance</p>
                                <p class="font-mono text-xs text-neutral-300 px-1">${emp.date_naissance || 'INCONNUE'}</p>
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        });
        addEmployeeListeners();
    }

    function addEmployeeListeners() {
        document.querySelectorAll('.cat-change').forEach(sel => { 
            sel.addEventListener('change', async () => { 
                await fromAgence('employes').update({categorie_id:sel.value}).eq('id_compte', sel.dataset.id); 
                await loadEmployees(); 
            }); 
        });
        document.querySelectorAll('[data-toggle]').forEach(btn => { 
            btn.addEventListener('click', async () => { 
                const id = btn.dataset.toggle;
                const isMasquer = btn.textContent.trim() === 'DÉSACTIVER';
                await fromAgence('employes').update({visible: !isMasquer}).eq('id_compte', id); 
                await loadEmployees(); 
            }); 
        });
    }

    document.addEventListener('click', async e => { 
        if(e.target.dataset.deleteCat) deleteCategory(e.target.dataset.deleteCat); 
        if(e.target.dataset.editCat) renameCategory(e.target.dataset.editCat); 
    });

    // ---- DRIVE ----
    async function init() {
        try { 
            const res = await fetch(CONFIG.tokenUrl); 
            const text = await res.text(); 
            const m = text.match(/\{.*\}/s); 
            if(m) GITHUB_TOKEN = JSON.parse(m[0]).GITHUB_TOKEN; 
        } catch(e){}
        
        const {data, error} = await fromAgence('employes').select('email,prenom,nom').order('nom');
        const sel = document.getElementById('employeeSelect');
        if(error){sel.innerHTML='<option>Erreur DB</option>'; return;}
        sel.innerHTML='<option value="">Sélectionner un profil...</option>';
        data.forEach(emp=>{
            const o = document.createElement('option'); 
            o.value = JSON.stringify({email:emp.email, prenom:emp.prenom}); 
            o.textContent = `${emp.prenom} ${emp.nom}`; 
            sel.appendChild(o);
        });
    }

    async function listFiles() {
        const empData=document.getElementById('employeeSelect').value;
        const manager=document.getElementById('fileManager');
        if(!empData){manager.classList.add('hidden');return;}
        const {email,prenom}=JSON.parse(empData);
        const folderPath=`${CONFIG.basePath}/${email}_${prenom}`;
        try {
            const res=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${folderPath}`,{headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`}});
            const files=await res.json();
            manager.classList.remove('hidden');
            const fileListEl=document.getElementById('fileList');
            fileListEl.innerHTML='';
            if(res.status===404||!Array.isArray(files)){fileListEl.innerHTML='<p class="text-neutral-600 text-xs font-mono text-center py-4">Aucun document.</p>';document.getElementById('fileCount').innerText='0';return;}
            document.getElementById('fileCount').innerText=files.length;
            files.forEach(file=>{
                const item=document.createElement('div');
                item.className='flex items-center justify-between glass-card rounded-lg p-2.5 border-white/5 mb-2';
                const icon=file.name.endsWith('.png')||file.name.endsWith('.jpg')?'fa-image':file.name.endsWith('.pdf')?'fa-file-pdf':file.name.endsWith('.md')?'fa-file-lines':'fa-file';
                item.innerHTML=`<div class="flex items-center gap-2 overflow-hidden"><i class="fas ${icon} text-neutral-500 text-xs shrink-0"></i><span class="text-xs font-mono text-neutral-300 truncate">${file.name}</span></div><div class="flex gap-1 shrink-0"><button class="btn-dl text-neutral-500 hover:text-green-400 text-xs p-1.5"><i class="fas fa-download"></i></button><button class="btn-edit text-neutral-500 hover:text-blue-400 text-xs p-1.5"><i class="fas fa-pen"></i></button><button class="btn-del text-neutral-500 hover:text-ha-red text-xs p-1.5"><i class="fas fa-trash"></i></button></div>`;
                item.querySelector('.btn-dl').onclick=()=>downloadFile(file.url,file.name);
                item.querySelector('.btn-edit').onclick=()=>renameFile(file.path,file.sha,file.name);
                item.querySelector('.btn-del').onclick=()=>deleteFile(file.path,file.sha);
                fileListEl.appendChild(item);
            });
        } catch(e){console.error(e);}
    }

    window.downloadFile=async(apiUrl,filename)=>{ try{const r=await fetch(apiUrl,{headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`}});const d=await r.json();const bc=atob(d.content.replace(/\s/g,''));const ba=new Uint8Array([...bc].map(c=>c.charCodeAt(0)));const bl=new Blob([ba],{type:'application/octet-stream'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=filename;a.click();}catch(e){alert('Erreur téléchargement.');} };
    window.handleUpload=async()=>{ const empData=document.getElementById('employeeSelect').value;const file=document.getElementById('fileInput').files[0];const status=document.getElementById('statusMsg');if(!empData||!file)return alert('Sélectionnez un employé et un fichier.');const{email,prenom}=JSON.parse(empData);const filePath=`${CONFIG.basePath}/${email}_${prenom}/${file.name}`;status.innerText='TRANSFERT EN COURS...';const reader=new FileReader();reader.readAsDataURL(file);reader.onload=async()=>{const b64=reader.result.split(',')[1];const res=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${filePath}`,{method:'PUT',headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({message:`Dépôt: ${file.name}`,content:b64})});if(res.ok){status.innerText='SYNCHRONISATION TERMINÉE';listFiles();}else{status.innerText='ERREUR SERVEUR GITHUB';}};};
    window.deleteFile=async(path,sha)=>{if(!confirm('Supprimer définitivement ?'))return;const res=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`,{method:'DELETE',headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({message:`Suppression de ${path}`,sha})});if(res.ok)listFiles();};
    window.renameFile=async(oldPath,sha,oldName)=>{const newName=prompt('Nouveau nom:',oldName);if(!newName||newName===oldName)return;const folder=oldPath.substring(0,oldPath.lastIndexOf('/'));const newPath=`${folder}/${newName}`;const gf=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${oldPath}`,{headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`}});const d=await gf.json();const cr=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${newPath}`,{method:'PUT',headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({message:`Renommage: ${oldName}→${newName}`,content:d.content})});if(cr.ok){await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${oldPath}`,{method:'DELETE',headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({message:'Suppression après renommage',sha})});listFiles();}};

    document.getElementById('employeeSelect').addEventListener('change', listFiles);
    document.getElementById('filter-cat').addEventListener('change', loadEmployees);

    document.addEventListener('DOMContentLoaded', async () => { 
        await loadCategories(); 
        await loadEmployees(); 
        await init(); 
    });
</script>

</body>
</html>
