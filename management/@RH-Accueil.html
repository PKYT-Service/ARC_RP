    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        neutral: {
                            850: '#1a1a1a',
                            900: '#111111',
                            950: '#070707',
                        },
                        ha: {
                            red: '#e11d48',

                            glow: 'rgba(225, 29, 72, 0.5)',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth transitions */
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        .font-display {
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(17, 17, 17, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-btn:hover {
            background: rgba(225, 29, 72, 0.1);
            border-color: rgba(225, 29, 72, 0.5);
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.2);
            transform: translateX(4px);
        }

        .sub-btn {
            position: relative;
            transition: all 0.2s ease;
        }

        .sub-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 2px;
            height: 60%;
            background-color: #e11d48;
            transition: transform 0.2s ease;
            border-radius: 4px;
        }

        .sub-btn:hover::before {
            transform: translateY(-50%) scaleY(1);
        }

        .sub-btn:hover {
            padding-left: 1.25rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 0.375rem;
        }

        .dark-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .dark-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .dark-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .dark-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .rotate-180 {
            transform: rotate(180deg);
        }

        .arrow-icon {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Loader Animation */
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(225, 29, 72, 0.1);
            border-top-color: #e11d48;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
        }

        .pulse-accent {
            box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7);
            animation: pulse-ring 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes pulse-ring {
            to {
                box-shadow: 0 0 0 10px rgba(225, 29, 72, 0);
            }
        }

        /* Background Glows */
        .bg-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(225, 29, 72, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
        }

        .bg-glow-2 {
            position: absolute;
            bottom: 10%;
            right: -20%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(225, 29, 72, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(60px);
        }

        iframe {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        iframe.loaded {
            opacity: 1;
        }
    </style>
</head>

        </div>
    </main>

    <script>
        // Navigation Logic
        function loadPage(url, title = "Navigation") {
            const frame = document.getElementById('main-frame');
            const loader = document.getElementById('loader');
            const titleDisplay = document.getElementById('page-title');
            const sectionDisplay = document.getElementById('current-section');
            const moduleNameDisplay = document.getElementById('loader-module-name');

            // Reset frame opacity to re-trigger fade in
            frame.classList.remove('loaded');

            // Show Loader
            loader.style.opacity = '1';
            loader.style.visibility = 'visible';

            // Text updates
            const urlModule = url.split('/').pop().replace('.html', '').replace(/[@%-_]/g, ' ').toUpperCase();
            moduleNameDisplay.innerText = urlModule || 'SYS';

            // Load URL - Using setTimeout to force paint so loader animation looks smooth
            setTimeout(() => {
                frame.src = url;
                titleDisplay.innerText = title;
                sectionDisplay.innerText = urlModule;
            }, 50);

            // Close Mobile Sidebar
            if (window.innerWidth < 1024) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('-translate-x-full')) {
                    toggleSidebar();
                }
            }
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            const frame = document.getElementById('main-frame');

            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                    frame.classList.add('loaded');
                }, 300); // Wait for transition
            }, 400); // Minimum artificial delay for perceived quality
        }

        function toggleDropdown(id) {
            const menu = document.getElementById(id);
            const arrow = document.getElementById('arrow-' + id);

            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                arrow.classList.add('rotate-180');
                arrow.classList.add('text-ha-red');
            } else {
                menu.classList.add('hidden');
                arrow.classList.remove('rotate-180');
                arrow.classList.remove('text-ha-red');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');

            sidebar.classList.toggle('-translate-x-full');

            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            } else {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        // Initialization
        window.onload = () => {
            loadPage('/HA-EE/management/@RH-load.html', 'Dashboard Standby');
        };
    </script>

    <script type="module">
        import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

        async function getHash(text) {
            const utf8 = new TextEncoder().encode(text.toLowerCase().trim());
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function updateIdentityBlock() {
            const nameEl = document.getElementById('user_full_name');
            const gradeEl = document.getElementById('user_grade_display');
            const avatarEl = document.getElementById('user_avatar');

            const token = sessionStorage.getItem('session_token');
            const isAuth = sessionStorage.getItem('isAuth');

            if (!token || !isAuth) {
                nameEl.textContent = "Non identifié";
                return;
            }

            try {
                const { data: employes, error: empError } = await supabase
                    .from('employes')
                    .select('email, nom, prenom, poste, echelon');

                if (empError || !employes) throw empError;

                let userData = null;

                for (const emp of employes) {
                    const h = await getHash(emp.email);
                    if (h === token) {
                        userData = emp;
                        break;
                    }
                }

                if (!userData) {
                    nameEl.textContent = "Empreinte inconnue";
                    return;
                }

                const nomFormatted = userData.nom.toUpperCase();
                const prenomFormatted = userData.prenom.charAt(0).toUpperCase() + userData.prenom.slice(1).toLowerCase();
                const initiales = (userData.nom.charAt(0) + userData.prenom.charAt(0)).toUpperCase();
                const ech = userData.echelon || "0";
                const grade = userData.poste || "S.Staff";

                nameEl.textContent = `${nomFormatted} ${prenomFormatted}`;
                gradeEl.innerHTML = `<i class="fa-solid fa-ranking-star mr-1 opacity-70"></i>${grade} <span class="bg-ha-red/20 text-ha-red px-1 rounded ml-1 text-[8px]">E.${ech}</span>`;
                avatarEl.innerHTML = initiales;

            } catch (err) {
                console.error("🚨 Erreur synchronisation identité :", err);
                nameEl.textContent = "Erreur Flux";
                gradeEl.textContent = "Liaison Interrompue";
            }
        }

        document.addEventListener('DOMContentLoaded', updateIdentityBlock);
    </script>
