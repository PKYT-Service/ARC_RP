<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>Howard Armory — Catalogue Armement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode:'class',
            theme:{ extend:{ fontFamily:{ sans:['Inter','sans-serif'], display:['Outfit','sans-serif'], mono:['Share Tech Mono','monospace'] }, colors:{ neutral:{ 850:'#1a1a1a', 900:'#111111', 950:'#070707' }, ha:{ red:'#E63946', gold:'#D4AF37' } } } }
        }
    </script>
    <style>
        body { font-family:'Inter',sans-serif; background-color:#070707; }
        .glass-card { background:rgba(20,20,20,0.6); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.05); transition:all 0.3s ease; }
        .glass-card:hover { border-color:rgba(212,175,55,0.25); box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .field { width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:0.75rem; padding:0.65rem 0.9rem; color:#d4d4d4; font-family:'Share Tech Mono',monospace; font-size:0.8125rem; outline:none; transition:border-color 0.3s; }
        .field:focus { border-color:#D4AF37; }
        .btn-gold { background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.4); color:#D4AF37; padding:0.5rem 1.25rem; border-radius:0.75rem; font-size:0.7rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; cursor:pointer; transition:all 0.3s; }
        .btn-gold:hover { background:#D4AF37; color:#000; }
        .btn-ghost { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); color:#737373; padding:0.5rem 1rem; border-radius:0.75rem; font-size:0.7rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; cursor:pointer; transition:all 0.3s; }
        .btn-ghost:hover { border-color:rgba(255,255,255,0.2); color:#fff; }
        .dark-scrollbar::-webkit-scrollbar{width:6px;} .dark-scrollbar::-webkit-scrollbar-track{background:transparent;} .dark-scrollbar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
        label { font-size:0.625rem; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; color:#737373; display:block; margin-bottom:0.35rem; }
    </style>
</head>
<body class="text-white selection:bg-ha-gold/30 overflow-y-auto dark-scrollbar min-h-screen">
    <div id="session/howard"></div>
    <script src="/HA-EE/src/javascript/menu.js"></script>
    <div id="menu"></div>

    <main class="max-w-5xl mx-auto p-4 lg:p-8 space-y-8 mt-4 pb-24" perms.pages="2;50;vendeur;page.weapons">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between md:items-end gap-4 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-display font-black uppercase tracking-tight">
                    Catalogue <span class="text-ha-gold">Armement</span>
                </h1>
                <p class="text-xs font-mono text-neutral-500 mt-2 tracking-widest uppercase"><i class="fas fa-crosshairs mr-2"></i>Database Management System v2.1</p>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-neutral-900 border border-white/10 px-3 py-2 rounded-xl">
                <div class="w-2 h-2 rounded-full animate-pulse bg-amber-500" id="status-dot"></div>
                <span class="text-[10px] font-mono uppercase tracking-widest text-neutral-400" id="status-text">Initialisation</span>
            </div>
        </div>

        <!-- FORM -->
        <div class="glass-card rounded-2xl p-6 relative overflow-hidden">
            <i class="fas fa-gun absolute -right-6 -bottom-6 text-8xl text-white/5 rotate-12"></i>
            <h2 class="text-sm font-mono uppercase tracking-widest text-neutral-400 mb-5"><i class="fas fa-plus mr-2 text-ha-gold"></i>Ajouter / Modifier</h2>
            <form id="product-form" class="relative z-10">
                <input type="hidden" id="produit-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label>Nom du produit</label><input type="text" id="name" placeholder="Glock 17" required class="field"></div>
                    <div><label>Prix Tactical</label><input type="text" id="price" placeholder="$5,000" required class="field"></div>
                    <div><label>Lien Image (URL)</label><input type="text" id="screen" placeholder="https://..." required class="field"></div>
                    <div><label>ID Système</label><input type="text" id="id_name" placeholder="weapon_glock" required class="field"></div>
                </div>
                <div class="flex gap-3 mt-5 items-center">
                    <button type="submit" id="submit-btn" disabled class="btn-gold"><i class="fas fa-save mr-2"></i><span id="btn-text">En attente du jeton...</span></button>
                    <button type="button" id="cancel-edit" class="btn-ghost hidden">Annuler modification</button>
                </div>
            </form>
        </div>

        <!-- CATALOGUE -->
        <div>
            <h2 class="text-sm font-mono uppercase tracking-widest text-neutral-500 mb-4"><i class="fas fa-boxes-stacked mr-2"></i>Inventaire en temps réel</h2>
            <div id="product-list" class="space-y-3">
                <div class="text-center text-neutral-600 font-mono text-xs uppercase tracking-widest py-12 animate-pulse">Chargement de la base de données...</div>
            </div>
        </div>
    </main>

    <script src="/HA-EE/src/javascript/footer.js"></script>
    <div id="footer"></div>

    <script type="module">
        const tokenUrl = "https://pkyt-database-up.vercel.app/code-source/E-CDE/Secure-token.js";
        const repo = "PKYT-Service/database_EnesCDE";
        const path = "divers/HowardArmory/produit_catalogue.json";

        let GITHUB_TOKEN = null;
        let products = [];
        let currentSha = null;

        async function init() {
            try {
                const res = await fetch(tokenUrl + "?t=" + Date.now());
                const data = await res.json();
                GITHUB_TOKEN = data.GITHUB_TOKEN;
                if (GITHUB_TOKEN) {
                    document.getElementById("status-dot").className = "w-2 h-2 rounded-full bg-green-500";
                    document.getElementById("status-text").innerText = "Connecté";
                    document.getElementById("submit-btn").disabled = false;
                    document.getElementById("btn-text").innerText = "Enregistrer";
                    await loadProducts();
                }
            } catch (e) { document.getElementById("status-text").innerText = "Erreur Jeton"; }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                if (!res.ok) throw new Error("GitHub Error");
                const data = await res.json();
                currentSha = data.sha;
                const content = decodeURIComponent(escape(atob(data.content)));
                products = JSON.parse(content);
                renderProducts();
            } catch (e) { document.getElementById("product-list").innerHTML = `<p class="text-ha-red text-center p-4 font-mono text-sm">Erreur chargement GitHub.</p>`; }
        }

        function renderProducts() {
            const list = document.getElementById("product-list");
            list.innerHTML = "";
            if (!products.length) {
                list.innerHTML = '<div class="text-center py-12 border border-dashed border-white/10 rounded-2xl text-neutral-600 font-mono text-sm uppercase tracking-widest"><i class="fas fa-ghost text-2xl mb-3 block opacity-40"></i>Catalogue vide.</div>';
                return;
            }
            products.forEach((p, i) => {
                const div = document.createElement("div");
                div.className = "glass-card rounded-xl p-4 flex items-center gap-4 group";
                div.innerHTML = `
                    <img src="${p.Screen}" class="w-16 h-16 rounded-xl object-cover border border-white/10 bg-black opacity-80 group-hover:opacity-100 transition-opacity" onerror="this.src='https://placehold.co/80x80/111/D4AF37?text=HA'">
                    <div class="flex-1">
                        <h4 class="font-display font-bold text-base uppercase tracking-tight">${p.Name}</h4>
                        <p class="text-ha-gold text-[10px] font-mono font-black uppercase tracking-widest mt-0.5">${p.Price}</p>
                        <p class="text-neutral-600 text-[9px] font-mono uppercase tracking-widest">${p.id_name}</p>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="window.editProduct(${i})" class="btn-ghost"><i class="fas fa-pen"></i></button>
                        <button onclick="window.deleteProduct(${i})" class="text-[10px] font-mono border border-ha-red/30 text-ha-red/60 hover:text-ha-red hover:border-ha-red px-3 py-1.5 rounded-lg transition-all cursor-pointer"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function sync() {
            const btnText = document.getElementById("btn-text");
            btnText.innerText = "Synchronisation...";
            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    method: "PUT",
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Mise à jour catalogue Howard Armory", content, sha: currentSha })
                });
                if (res.ok) { await loadProducts(); resetForm(); }
                else { alert("Erreur de sauvegarde (Sha mismatch ou Token)"); }
            } catch (e) { alert("Erreur réseau"); }
            finally { btnText.innerText = "Enregistrer"; }
        }

        window.editProduct = (i) => {
            const p = products[i];
            document.getElementById("produit-id").value = i;
            document.getElementById("name").value = p.Name;
            document.getElementById("price").value = p.Price;
            document.getElementById("screen").value = p.Screen;
            document.getElementById("id_name").value = p.id_name;
            document.getElementById("btn-text").innerText = "Mettre à jour";
            document.getElementById("cancel-edit").classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        window.deleteProduct = (i) => { if (confirm(`Supprimer ${products[i].Name} ?`)) { products.splice(i, 1); sync(); } };

        function resetForm() {
            document.getElementById("product-form").reset();
            document.getElementById("produit-id").value = "";
            document.getElementById("cancel-edit").classList.add("hidden");
            document.getElementById("btn-text").innerText = "Enregistrer";
        }

        document.getElementById("product-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const id = document.getElementById("produit-id").value;
            const data = { produit: id !== "" ? products[id].produit : products.length + 1, Name: document.getElementById("name").value, Price: document.getElementById("price").value, Screen: document.getElementById("screen").value, id_name: document.getElementById("id_name").value };
            if (id !== "") products[id] = data; else products.push(data);
            sync();
        });
        document.getElementById("cancel-edit").onclick = resetForm;
        init();
    </script>
</body>
</html>
