<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="/HA-EE/src/css/arc-theme.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- E-CDE Account & Security Soft -->
    <script src="/HA-EE/src/javascript/systeme.js" type="module"></script>
    <title>S&AS - Création Déclaration</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    },
                    colors: {
                        neutral: { 850: '#1a1a1a', 900: '#111111', 950: '#070707' },
                        ha: { red: '#e11d48', darkred: '#9f1239', glow: 'rgba(225, 29, 72, 0.5)' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: transparent; }
        
        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s;
        }
        .input-glass:focus {
            border-color: #eab308; /* Yellow focus for supervisor override */
            outline: none;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }
        
        /* Time Input Icon Color Fix for dark backgrounds */
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }

        .dark-scrollbar::-webkit-scrollbar { width: 6px; }
        .dark-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>

<body class="text-white selection:bg-yellow-500 selection:text-black h-screen overflow-y-auto dark-scrollbar">
    <div id="session/howard"></div>
    <script src="/HA-EE/src/javascript/menu.js"></script>
    <div id="menu" class="hidden"></div>

    <main id="content" class="w-full h-full p-4 lg:p-8">
        <div perms.pages="2;rh;page.as_2;page.as_ad" class="max-w-3xl mx-auto">
            
            <!-- HEADER -->
            <div class="border-b border-white/10 pb-6 mb-8 mt-4 text-center md:text-left flex flex-col md:flex-row justify-between md:items-end gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-display font-black uppercase tracking-tight text-white">
                        Protocole AS - <span class="text-yellow-500">Superviseur</span>
                    </h1>
                    <p class="text-xs text-neutral-500 font-mono mt-2 tracking-widest uppercase">
                        <i class="fa-solid fa-code-branch mr-2"></i>Howard Armory - Manual Override System V5
                    </p>
                </div>
                <div class="bg-yellow-500/10 border border-yellow-500/20 px-3 py-1.5 rounded-lg text-[10px] font-mono text-yellow-500 uppercase tracking-widest flex items-center shadow-inner">
                    <i class="fa-solid fa-unlock-keyhole mr-2"></i> Elev. Privileges
                </div>
            </div>

            <!-- FORM CARD -->
            <div class="glass-card rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
                <!-- Background decor -->
                <div class="absolute top-0 right-0 w-64 h-64 bg-yellow-500/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

                <form id="as-form" class="space-y-8 relative z-10">

                    <!-- AGENT SELECTION -->
                    <div class="relative">
                        <label class="block text-[10px] font-display font-bold uppercase tracking-widest text-neutral-400 mb-3">
                            <i class="fa-solid fa-user-magnifying-glass mr-2"></i>Sélectionner l'Agent
                        </label>
                        <div class="relative">
                            <input type="text" id="search-agent" placeholder="Saisir nom, prénom, ou email..." required
                                class="input-glass w-full rounded-xl p-4 font-mono text-sm placeholder:text-neutral-600 transition-all pl-12">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500"></i>
                        </div>

                        <div id="agent-results" class="hidden absolute z-50 w-full mt-2 bg-neutral-900 border border-white/10 rounded-xl shadow-2xl max-h-56 overflow-y-auto dark-scrollbar">
                        </div>

                        <input type="hidden" id="selected-agent-email">

                        <!-- BADGE SELECTION -->
                        <div id="agent-badge" class="hidden mt-4 p-4 bg-black/60 border border-yellow-500/30 rounded-xl flex items-center justify-between transition-all">
                            <div class="flex items-center gap-4">
                                <div class="h-10 w-10 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-lg text-black flex items-center justify-center font-display font-black text-lg shadow-lg" id="agent-initials">?</div>
                                <div>
                                    <div class="text-sm font-display font-bold text-white uppercase tracking-wide" id="agent-full-name">Aucun sélectionné</div>
                                    <div class="text-[10px] text-neutral-500 font-mono tracking-wider mt-0.5" id="agent-display-email">---</div>
                                </div>
                            </div>
                            <div class="text-[9px] font-mono text-yellow-500 border border-yellow-500/30 px-2 py-1 rounded bg-yellow-500/10">CIBLE VALIDÉE</div>
                        </div>
                    </div>

                    <!-- DATE -->
                    <div>
                        <label class="block text-[10px] font-display font-bold uppercase tracking-widest text-neutral-400 mb-3">
                            <i class="fa-regular fa-calendar-days mr-2"></i>Date d'opération
                        </label>
                        <input type="date" id="date_service" required class="input-glass w-full md:w-1/2 rounded-xl p-3 font-mono text-sm">
                    </div>

                    <!-- HOURS -->
                    <div class="border-t border-white/5 pt-6">
                        <label class="block text-[10px] font-display font-bold uppercase tracking-widest text-neutral-400 mb-4">
                            <i class="fa-regular fa-clock mr-2"></i>Plages horaires (Vacations)
                        </label>
                        <div id="horaires-list" class="space-y-3">
                            <div class="flex flex-col sm:flex-row gap-3 items-center horaire-row bg-black/40 p-3 rounded-xl border border-white/5 relative">
                                <div class="w-full sm:flex-1 relative">
                                    <span class="absolute -top-2 left-3 bg-neutral-900 px-1 text-[9px] font-mono text-neutral-500">DE</span>
                                    <input type="time" class="time-de input-glass w-full rounded-lg p-3 font-mono text-sm pl-4" required>
                                </div>
                                <div class="hidden sm:block text-neutral-600"><i class="fa-solid fa-arrow-right"></i></div>
                                <div class="w-full sm:flex-1 relative">
                                    <span class="absolute -top-2 left-3 bg-neutral-900 px-1 text-[9px] font-mono text-neutral-500">À</span>
                                    <input type="time" class="time-a input-glass w-full rounded-lg p-3 font-mono text-sm pl-4" required>
                                </div>
                                <button type="button" onclick="removeRow(this)" class="w-full sm:w-auto mt-2 sm:mt-0 bg-neutral-900 hover:bg-ha-red/20 text-neutral-500 hover:text-ha-red border border-white/5 hover:border-ha-red/30 p-3 rounded-lg transition-all" title="Supprimer">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>

                        <button type="button" onclick="addRow()" class="mt-4 px-4 py-2 border border-yellow-500/30 text-yellow-500 bg-yellow-500/5 hover:bg-yellow-500 hover:text-black rounded-lg text-xs font-bold font-display uppercase tracking-wider transition-all">
                            <i class="fas fa-plus mr-2"></i> Ajouter une vacation
                        </button>
                    </div>

                    <!-- NOTES -->
                    <div class="border-t border-white/5 pt-6">
                        <label class="block text-[10px] font-display font-bold uppercase tracking-widest text-neutral-400 mb-3">
                            <i class="fa-solid fa-clipboard-list mr-2"></i>Note de service (Optionnel)
                        </label>
                        <textarea id="commentaire" placeholder="Ex: Pointage manuel suite à un dysfonctionnement matériel..." class="input-glass w-full rounded-xl p-4 h-24 font-sans text-sm resize-none"></textarea>
                    </div>

                    <!-- TOTAL PREVIEW -->
                    <div class="bg-gradient-to-r from-yellow-500/10 to-transparent border-l-2 border-yellow-500 rounded-r-xl p-5 mt-8">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-neutral-400 font-display uppercase font-bold tracking-widest text-xs">Total estimé</span>
                            <span id="total-preview" class="text-yellow-500 font-mono font-black text-2xl drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]">00h 00m</span>
                        </div>
                        <p class="text-[9px] font-mono text-neutral-500 mt-2 text-right">Calcul basé sur des tranches pures de 15 minutes.</p>
                    </div>

                    <!-- SUBMIT -->
                    <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-display font-black py-4 rounded-xl uppercase tracking-widest transition-all shadow-[0_0_20px_rgba(234,179,8,0.3)] hover:shadow-[0_0_30px_rgba(234,179,8,0.5)] transform hover:-translate-y-1 text-sm">
                        Exécuter L'Inscription Manuelle
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase, fromAgence, insertAgence, withAgence } from '/HA-EE/src/javascript/sp.js';

        document.getElementById('date_service').valueAsDate = new Date();

        const searchInput = document.getElementById('search-agent');
        const resultsContainer = document.getElementById('agent-results');

        searchInput.addEventListener('input', async (e) => {
            const term = e.target.value.trim();
            if (term.length < 2) {
                resultsContainer.classList.add('hidden');
                return;
            }

            const { data: users, error } = await supabase
                .from('employes')
                .select('nom, prenom, email')
                .or(`email.ilike.%${term}%,nom.ilike.%${term}%,prenom.ilike.%${term}%`)
                .limit(6);

            if (users && users.length > 0) {
                resultsContainer.innerHTML = users.map(u => `
                    <div class="p-4 hover:bg-white/5 cursor-pointer border-b border-white/5 last:border-0 transition-colors flex items-center gap-3" 
                         onclick="selectAgent('${u.email}', '${u.nom} ${u.prenom}')">
                        <div class="w-8 h-8 rounded bg-neutral-800 border border-white/5 flex items-center justify-center font-display font-black text-white text-xs">${u.nom[0].toUpperCase()}</div>
                        <div>
                            <div class="text-white font-display font-bold text-xs uppercase tracking-wide">${u.nom} ${u.prenom}</div>
                            <div class="text-neutral-500 text-[10px] font-mono mt-0.5">${u.email}</div>
                        </div>
                    </div>
                `).join('');
                resultsContainer.classList.remove('hidden');
            } else {
                 resultsContainer.innerHTML = `<div class="p-4 text-center font-mono text-xs text-neutral-500">Aucun résultat.</div>`;
                 resultsContainer.classList.remove('hidden');
            }
        });

        // Hide results when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !resultsContainer.contains(e.target)) {
                resultsContainer.classList.add('hidden');
            }
        });

        window.selectAgent = (email, name) => {
            document.getElementById('selected-agent-email').value = email;
            document.getElementById('agent-full-name').innerText = name;
            document.getElementById('agent-display-email').innerText = email;
            document.getElementById('agent-initials').innerText = name[0].toUpperCase();

            document.getElementById('agent-badge').classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            searchInput.value = name;
        };

        window.addRow = function () {
            const container = document.getElementById('horaires-list');
            const newRow = document.createElement('div');
            newRow.className = "flex flex-col sm:flex-row gap-3 items-center horaire-row bg-black/40 p-3 rounded-xl border border-white/5 relative opacity-0 translate-y-4 transition-all duration-300";
            newRow.innerHTML = `
                <div class="w-full sm:flex-1 relative">
                    <span class="absolute -top-2 left-3 bg-neutral-900 px-1 text-[9px] font-mono text-neutral-500">DE</span>
                    <input type="time" class="time-de input-glass w-full rounded-lg p-3 font-mono text-sm pl-4" required>
                </div>
                <div class="hidden sm:block text-neutral-600"><i class="fa-solid fa-arrow-right"></i></div>
                <div class="w-full sm:flex-1 relative">
                    <span class="absolute -top-2 left-3 bg-neutral-900 px-1 text-[9px] font-mono text-neutral-500">À</span>
                    <input type="time" class="time-a input-glass w-full rounded-lg p-3 font-mono text-sm pl-4" required>
                </div>
                <button type="button" onclick="removeRow(this)" class="w-full sm:w-auto mt-2 sm:mt-0 bg-neutral-900 hover:bg-ha-red/20 text-neutral-500 hover:text-ha-red border border-white/5 hover:border-ha-red/30 p-3 rounded-lg transition-all" title="Supprimer">
                    <i class="fas fa-trash-alt"></i>
                </button>
            `;
            container.appendChild(newRow);
            // Trigger reflow for animation
            void newRow.offsetWidth;
            newRow.classList.remove('opacity-0', 'translate-y-4');
            attachListeners();
        }

        window.removeRow = function (btn) {
            const rows = document.querySelectorAll('.horaire-row');
            if (rows.length > 1) {
                const row = btn.closest('.horaire-row');
                row.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    row.remove();
                    calculateTotal();
                }, 200); // match transition duration
            } else {
                 Swal.fire({
                    icon: 'warning',
                    title: 'Action impossible',
                    text: 'Il vous faut au moins une ligne de vacation.',
                    background: '#111', color: '#fff',
                    customClass: { popup: 'border border-yellow-500/30 font-sans' }
                });
            }
        }

        function calculateTotal() {
            let totalMin = 0;
            document.querySelectorAll('.horaire-row').forEach(row => {
                const de = row.querySelector('.time-de').value;
                const a = row.querySelector('.time-a').value;
                if (de && a) {
                    const [hD, mD] = de.split(':').map(Number);
                    let [hA, mA] = a.split(':').map(Number);
                    let start = hD * 60 + mD;
                    let end = hA * 60 + mA;
                    if (end < start) end += 1440;
                    totalMin += (end - start);
                }
            });
            const hours = Math.floor(totalMin / 60);
            const mins = totalMin % 60;
            document.getElementById('total-preview').innerText = `${hours.toString().padStart(2, '0')}h ${mins.toString().padStart(2, '0')}m`;
            return totalMin;
        }

        function attachListeners() {
            document.querySelectorAll('input[type="time"]').forEach(input => {
                input.onchange = calculateTotal;
            });
        }
        attachListeners();

        document.getElementById('as-form').onsubmit = async (e) => {
            e.preventDefault();

            const targetEmail = document.getElementById('selected-agent-email').value;
            if (!targetEmail) {
                Swal.fire({ icon: 'error', title: 'Agent manquant', text: "Sélectionnez un agent valide.", background: '#111', color: '#fff' });
                return;
            }

            const vacations = [];
            document.querySelectorAll('.horaire-row').forEach(row => {
                vacations.push({
                    de: row.querySelector('.time-de').value,
                    a: row.querySelector('.time-a').value
                });
            });
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Exécution...';
            btn.disabled = true;

            const { error } = await insertAgence('assurance_sante', [{
                email: targetEmail,
                date_service: document.getElementById('date_service').value,
                horaires: vacations,
                commentaire: document.getElementById('commentaire').value + " (Saisie Superviseur)",
                statut: 'en_attente'
            }]);

            btn.disabled = false;
            btn.innerHTML = originalText;

            if (error) {
                Swal.fire({ icon: 'error', title: 'Erreur Serveur', text: error.message, background: '#111', color: '#fff' });
            } else {
                triggerDeclarationSuccess();
            }
        };

        function triggerDeclarationSuccess() {
            Swal.fire({
                title: 'OPÉRATION RÉUSSIE',
                text: "Déclaration manuelle enregistrée. En attente de validation monétaire.",
                icon: 'success',
                background: '#0a0a0a',
                color: '#ffffff',
                showCancelButton: true,
                confirmButtonColor: '#eab308',
                cancelButtonColor: '#262626',
                confirmButtonText: 'Voir Tableau de Bord',
                cancelButtonText: 'Nouvelle saisie',
                heightAuto: false,
                customClass: {
                    popup: 'border border-green-500/30 font-sans rounded-2xl'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/HA-EE/management/@S&AS-Accueil.html';
                } else {
                    document.getElementById('as-form').reset();
                    document.getElementById('agent-badge').classList.add('hidden');
                    document.getElementById('selected-agent-email').value = '';
                    document.getElementById('total-preview').innerText = '00h 00m';
                    // Reset to one row
                    const rows = document.querySelectorAll('.horaire-row');
                    for(let i=1; i<rows.length; i++) rows[i].remove();
                }
            });
        }
    </script>
</body>
</html>
